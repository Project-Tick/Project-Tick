name: Build pipeline
run-name: build ${{ inputs.app_id }} from ${{ inputs.git_ref }}

concurrency:
  group: build-${{ inputs.app_id }}-${{ inputs.git_ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Application ID'
        required: true
      git_ref:
        description: 'Git reference'
        required: true
      pr_target_branch:
        description: 'Target branch for PR builds'
        required: false
        default: 'master'
      callback_url:
        description: 'Callback URL'
        required: true
      callback_token:
        description: 'Callback token'
        required: true
      build_type:
        description: 'Build type'
        required: true
        default: 'default'
      spot:
        description: 'Use spot instances'
        required: false
        default: 'true'

jobs:
  check-event-type:
    runs-on: ubuntu-latest
    steps:
      - name: Check event type
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "This workflow only supports workflow_dispatch events"
            exit 1
          fi

  update-log-url:
    runs-on: ubuntu-latest
    needs: check-event-type
    steps:
      - name: Report log URL to the backend
        run: |
          CALLBACK_TOKEN="$(jq -r '.inputs.callback_token' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$CALLBACK_TOKEN"

          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_TOKEN" \
            -d '{"log_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "${{ inputs.callback_url }}/log_url"

  setup-matrix:
    runs-on: ubuntu-latest
    needs: check-event-type
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: project-tick/${{ inputs.app_id }}
          fetch-depth: 1
          path: repo
          ref: ${{ inputs.git_ref }}

      - id: set-matrix
        shell: python
        run: |
          import json
          import os

          arches = ["x86_64", "aarch64"]
          build_type = "${{ inputs.build_type }}"

          matrix = {"include": []}
          for arch in arches:
              arch = arch.strip()

              if build_type != 'default':
                  timeout = 60 * 9
                  match arch:
                      case "x86_64":
                          runner = f"runs-on=${{ github.run_id }}-${{ github.run_attempt }}/runner={build_type}-amd64/tag=arch-amd64/retry=false/spot=${{ inputs.spot }}"
                      case "aarch64":
                          runner = f"runs-on=${{ github.run_id }}-${{ github.run_attempt }}/runner={build_type}-arm64/tag=arch-arm64/retry=false/spot=${{ inputs.spot }}"
                      case _:
                          print(f"Error: Unsupported architecture: {arch}")
                          exit(1)
              else:
                  timeout = 60 * 6
                  match arch:
                      case "x86_64":
                          runner = "ubuntu-24.04"
                      case "aarch64":
                          runner = "ubuntu-24.04-arm"
                      case _:
                          print(f"Error: Unsupported architecture: {arch}")
                          exit(1)

              matrix["include"].append({"arch": arch, "runner": runner, "timeout-minutes": timeout})

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

  build:
    needs: [update-log-url, setup-matrix]
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout-minutes }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix).include }}
    permissions:
      packages: write
    steps:
      - uses: runs-on/action@v2
        if: ${{ inputs.build_type != 'default' }}
        with:
          show_costs: summary
          metrics: disk

      - name: Set variables
        run: |
          echo "APP_ID=${{ inputs.app_id }}" >> $GITHUB_ENV
          echo "REPO=https://github.com/project-tick/${{ inputs.app_id }}" >> $GITHUB_ENV
          echo "REF=${{ inputs.git_ref }}" >> $GITHUB_ENV
          echo "PR_TARGET_BRANCH=${{ inputs.pr_target_branch }}" >> $GITHUB_ENV
          echo "BUILD_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Create work directory
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/work/tmp
          mkdir -p ${GITHUB_WORKSPACE}/flatpak
          chmod -R 777 ${GITHUB_WORKSPACE}/work

      - name: Checkout foreman (for justfile and seccomp profile)
        uses: actions/checkout@v4
        with:
          path: foreman

      - name: Copy build tools
        run: |
          cp foreman/justfile ${GITHUB_WORKSPACE}/work/.flathub.justfile
          cp foreman/flatpak.seccomp.json ${GITHUB_WORKSPACE}/flatpak.seccomp.json

      - name: Disable Apparmor
        run: |
          sudo aa-teardown >/dev/null 2>&1 || true
          sudo systemctl disable --now apparmor.service >/dev/null 2>&1

      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Check version and status
        run: |
          timeout 5 docker --version || true
          timeout 10 sudo aa-status || true

      - name: Checkout app repository
        run: |
          docker run --rm \
            --entrypoint="" \
            --security-opt apparmor=unconfined \
            --security-opt seccomp=${GITHUB_WORKSPACE}/flatpak.seccomp.json \
            -v "${GITHUB_WORKSPACE}/work:/work" \
            -w /work \
            -e REPO \
            -e REF \
            -e TMPDIR=/work/tmp \
            ghcr.io/flathub-infra/flatpak-builder-lint:unprivileged \
            /bin/bash -c '
              git config --global --add safe.directory "*"
              just -f .flathub.justfile checkout $REPO $REF
            '

      - name: Free up disk space
        run: |
          sudo swapoff -a || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/share/boost || true
          sudo rm -rf /usr/local/lib/android /usr/lib/jvm /usr/lib/mono || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/*
          df -hHl || true

      - name: Download sources
        run: |
          docker run --rm \
            --security-opt seccomp=${GITHUB_WORKSPACE}/flatpak.seccomp.json \
            --security-opt apparmor=unconfined \
            --cap-drop all \
            --entrypoint="" \
            -e TMPDIR=/work/tmp \
            -v /proc:/host/proc \
            -v "${GITHUB_WORKSPACE}/work:/work" \
            -w /work \
            -e APP_ID \
            ghcr.io/flathub-infra/flatpak-builder-lint:unprivileged \
            /bin/bash -c '
              just -f .flathub.justfile prepare-env || exit 1
              just -f .flathub.justfile download-sources $APP_ID || exit 1
            '

      - name: Build
        run: |
          docker run --rm \
            --security-opt seccomp=${GITHUB_WORKSPACE}/flatpak.seccomp.json \
            --security-opt apparmor=unconfined \
            --cap-drop all \
            --entrypoint="" \
            -e TMPDIR=/work/tmp \
            -v /proc:/host/proc \
            -v "${GITHUB_WORKSPACE}/work:/work" \
            -v "${GITHUB_WORKSPACE}/flatpak:/home/flatbld/.local/share/flatpak" \
            -w /work \
            -e APP_ID \
            -e REF \
            -e BUILD_ARCH \
            ghcr.io/flathub-infra/flatpak-builder-lint:unprivileged \
            /bin/bash -c '
              just -f .flathub.justfile prepare-env || exit 1
              just -f .flathub.justfile build $APP_ID $REF $BUILD_ARCH || exit 1
              just -f .flathub.justfile install-if-extra-data $APP_ID $REF || exit 1
            '

      - name: List files in build directory
        if: always()
        run: |
          cd "${GITHUB_WORKSPACE}/work/builddir/files" || true
          timeout 80 du -xhad 5 . --exclude=./lib/debug --exclude=./share/locale --exclude=./share/runtime | sort -k2 || true

      - name: Get free space
        if: always()
        run: |
          timeout 5 df -hHl || true
          timeout 30 du -sh "${GITHUB_WORKSPACE}/work/repo" || true

      - name: Report build cost
        if: ${{ inputs.build_type != 'default' && always() }}
        run: |
          if [[ -z "$RUNS_ON_INSTANCE_LAUNCHED_AT" ]]; then
            echo "Not a RunsOn runner, skipping cost report"
            exit 0
          fi

          CALLBACK_TOKEN="$(jq -r '.inputs.callback_token' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$CALLBACK_TOKEN"

          COST_RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"instanceType\": \"${RUNS_ON_INSTANCE_TYPE}\",
              \"instanceLifecycle\": \"${RUNS_ON_INSTANCE_LIFECYCLE:-spot}\",
              \"region\": \"${RUNS_ON_AWS_REGION}\",
              \"az\": \"${RUNS_ON_AWS_AZ}\",
              \"arch\": \"${RUNS_ON_AGENT_ARCH:-x64}\",
              \"startedAt\": \"${RUNS_ON_INSTANCE_LAUNCHED_AT}\",
              \"platform\": \"linux\"
            }" \
            "https://go.runs-on.com/api/costs" 2>/dev/null || echo "{}")

          TOTAL_COST=$(echo "$COST_RESPONSE" | jq -r '.totalCost // 0')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_TOKEN" \
            -d "{\"cost\": $TOTAL_COST}" \
            "${{ inputs.callback_url }}/cost" || true

  # Update callback logic if adding new jobs before this
  callback:
    runs-on: ubuntu-latest
    needs: [check-event-type, update-log-url, setup-matrix, build]
    if: ${{ always() }}
    steps:
      - name: Report job status
        run: |
          CALLBACK_TOKEN="$(jq -r '.inputs.callback_token' $GITHUB_EVENT_PATH)"
          echo "::add-mask::$CALLBACK_TOKEN"

          results='${{ toJson(needs.*.result) }}'

          if echo "$results" | grep -q '"failure"'; then
            status="failure"
          elif echo "$results" | grep -q '"cancelled"'; then
            status="cancelled"
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            status="success"
          else
            status="failure"
          fi

          echo "Reporting status: $status"

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_TOKEN" \
            -d "{\"status\": \"${status}\"}" \
            "${{ inputs.callback_url }}/status"

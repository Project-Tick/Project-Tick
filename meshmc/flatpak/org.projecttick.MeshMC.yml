  - name: javalauncher
    buildsystem: cmake-ninja
    builddir: true
    subdir: javalauncher
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        JAVA_COMPILER: /usr/lib/sdk/openjdk17/jvm/openjdk-17/bin/javac
    sources:
      - type: git
        url: https://git.projecttick.org/pub/scm/git/Project-Tick/Project-Tick.git
        branch: master
        disable-submodules: true
        disable-lfs: true

  - name: meshmc
    buildsystem: simple
    build-commands:
      - >-
        cmake -S meshmc -B _flatpak_build -G Ninja
        -DCMAKE_INSTALL_PREFIX=/app
        -DCMAKE_BUILD_TYPE=RelWithDebInfo
        -DCMAKE_PREFIX_PATH=/app
        -DMeshMC_BUILD_PLATFORM=flatpak-nightly
        -DMeshMC_DISABLE_JAVA_DOWNLOADER=OFF
        -DMeshMC_PLUGINS=ON
        -DMeshMC_STAGING_PLUGINS=ON
        -DBUILD_TESTING=OFF
        -DCMAKE_CXX_FLAGS=-pedantic\ -fstack-protector-strong\ --param=ssp-buffer-size=4\ -O3
      - sed -i 's|DIRECTORIES "/usr/lib"|DIRECTORIES "/app/lib" "/usr/lib"|g' _flatpak_build/launcher/cmake_install.cmake
      - sed -i 's|DIRECTORIES "/lib"|DIRECTORIES "/app/lib" "/lib"|g' _flatpak_build/launcher/cmake_install.cmake
      - cmake --build _flatpak_build -j${FLATPAK_BUILDER_N_JOBS}
      - cmake --install _flatpak_build
      - install -Dm755 extra/prime-run /app/bin/prime-run
      - mv /app/bin/meshmc /app/bin/meshmcrun
      - install -Dm755 extra/meshmc-wrapper /app/bin/meshmc
      - /usr/lib/sdk/openjdk17/installjdk.sh
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        PATH: /usr/lib/sdk/openjdk17/jvm/openjdk-17/bin:/app/bin:/usr/bin
    sources:
      - type: git
        url: https://git.projecttick.org/pub/scm/git/Project-Tick/Project-Tick.git
        branch: master
        disable-submodules: true
        disable-lfs: true
      - type: file
        path: prime-run
        dest: extra
      - type: file
        path: meshmc-wrapper
        dest: extra

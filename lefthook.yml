pre-commit:
  jobs:
    - name: reuse-lint
      run: |
        if ! reuse lint; then
          echo "Downloading missing licenses..."
          reuse download --all
          git add LICENSES/
          echo "Missing licenses downloaded and staged."
          # Re-check after fix
          reuse lint
        fi

pre-push:
  jobs:
    - name: reuse-lint
      run: |
        if ! reuse lint; then
          echo "Downloading missing licenses..."
          reuse download --all
          git add LICENSES/
          echo "Missing licenses downloaded and staged."
          reuse lint
        fi

name: "neozip: Package Check"

on:
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  pkgcheck:
    needs: callback-start
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler: gcc
            cxx-compiler: g++

          - name: Ubuntu GCC AARCH64
            os: ubuntu-24.04-arm
            compiler: gcc
            cxx-compiler: g++

          - name: macOS Clang
            os: macOS-latest
            compiler: clang
            cxx-compiler: clang++

    steps:
      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
        with:
          show-progress: 'false'

      - name: Install packages (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            abigail-tools \
            diffoscope \
            ninja-build

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja diffoscope
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1

      - name: Compare builds
        working-directory: neozip
        run: sh test/pkgcheck.sh
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.cxx-compiler }}

      - name: Compare builds (compat)
        working-directory: neozip
        run: sh test/pkgcheck.sh --zlib-compat
        env:
          CC: ${{ matrix.compiler }}

      - name: Check ABI
        if: runner.os != 'macOS'
        working-directory: neozip
        run: sh test/abicheck.sh --refresh-if
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.cxx-compiler }}

      - name: Check ABI (compat)
        if: runner.os != 'macOS'
        working-directory: neozip
        run: sh test/abicheck.sh --zlib-compat --refresh-if
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.cxx-compiler }}

      - name: Upload build errors
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ matrix.name }}
          path: |
            neozip/**/*.abi
            neozip/btmp1/configure.log
            neozip/btmp2/configure.log
          retention-days: 30

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - pkgcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

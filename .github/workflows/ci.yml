# ╔══════════════════════════════════════════════════════════════════╗
# ║  Project Tick — Monolithic CI Orchestrator                       ║
# ║                                                                  ║
# ║  Every bot-dispatched push, pull request, merge queue entry,     ║
# ║  and manual dispatch flow through this single gate. Nothing      ║
# ║  unless this file says so.                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI

on:
  pull_request_target:
    types: [closed, labeled]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      force-all:
        description: "Force run all project CI pipelines"
        type: boolean
        default: false
      build-type:
        description: "Build configuration for meshmc/forgewrapper"
        type: choice
        options: [Debug, Release]
        default: Debug
      source-repository:
        description: "Optional external repository URL to fetch source from"
        type: string
        default: ""
      source-ref:
        description: "Optional external ref to fetch when source-repository is set"
        type: string
        default: ""
      event-name:
        description: "Original event name when dispatched by the bot"
        type: string
        default: ""
      event-actor:
        description: "Original actor login when dispatched by the bot"
        type: string
        default: ""
      source-sha:
        description: "Original source SHA when dispatched by the bot"
        type: string
        default: ""
      before-sha:
        description: "Original push before SHA when dispatched by the bot"
        type: string
        default: ""
      head-ref:
        description: "Original head ref when dispatched by the bot"
        type: string
        default: ""
      base-ref:
        description: "Original base ref when dispatched by the bot"
        type: string
        default: ""
      pr-number:
        description: "Original PR number when dispatched by the bot"
        type: string
        default: ""
      pr-base-sha:
        description: "Original PR base SHA when dispatched by the bot"
        type: string
        default: ""
      pr-head-sha:
        description: "Original PR head SHA when dispatched by the bot"
        type: string
        default: ""
      pr-title:
        description: "Original PR title when dispatched by the bot"
        type: string
        default: ""
      pr-draft:
        description: "Original PR draft flag when dispatched by the bot"
        type: string
        default: ""
      callback_url:
        description: "Optional Foreman callback base URL"
        type: string
        default: ""
      callback_token:
        description: "Optional Foreman callback bearer token"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.event.inputs.event-name || github.event_name }}-${{
      github.event.inputs.source-ref ||
      (github.event_name == 'merge_group' && github.event.merge_group.head_ref) ||
      (github.event_name == 'pull_request_target' && format('pr-{0}', github.event.pull_request.number)) ||
      github.ref
    }}
  cancel-in-progress: true

# ╔════════════════════════════════════════════════════════════════╗
# ║ Environment — shared across all jobs                           ║
# ╚════════════════════════════════════════════════════════════════╝
env:
  CI: true
  CI_EVENT_NAME: ${{ github.event.inputs.event-name || github.event_name }}
  CI_REF: ${{ github.event.inputs.source-ref || github.ref }}
  CI_SHA: ${{ github.event.inputs.source-sha || github.sha }}
  CI_BEFORE_SHA: ${{ github.event.inputs.before-sha || github.event.before || '' }}
  CI_ACTOR: ${{ github.event.inputs.event-actor || github.actor }}
  CI_HEAD_REF: ${{ github.event.inputs.head-ref || github.head_ref || '' }}
  CI_BASE_REF: ${{ github.event.inputs.base-ref || github.base_ref || '' }}
  CI_PR_NUMBER: ${{ github.event.inputs.pr-number || github.event.pull_request.number || '' }}
  CI_PR_BASE_SHA: ${{ github.event.inputs.pr-base-sha || github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
  CI_PR_HEAD_SHA: ${{ github.event.inputs.pr-head-sha || github.event.pull_request.head.sha || github.event.merge_group.head_sha || '' }}
  CI_PR_TITLE: ${{ github.event.inputs.pr-title || github.event.pull_request.title || '' }}
  CI_PR_DRAFT: ${{ github.event.inputs.pr-draft || (github.event.pull_request.draft && 'true' || 'false') }}
  CI_MERGE_GROUP_BASE_REF: ${{ github.event.merge_group.base_ref || '' }}
  FORCE_ALL: ${{ github.event.inputs.force-all == 'true' || (github.event.inputs.event-name || github.event_name) == 'merge_group' }}

jobs:
  callback-start:
    name: "Callback Start"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    permissions: {}
    steps:
      - name: Prepare callback destination
        id: prepare
        shell: bash
        env:
          INPUT_CALLBACK_URL: ${{ github.event.inputs.callback_url || '' }}
          INPUT_CALLBACK_TOKEN: ${{ github.event.inputs.callback_token || '' }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          EVENT_NAME: ${{ env.CI_EVENT_NAME }}
          REPOSITORY: ${{ github.repository }}
          REF: ${{ env.CI_REF }}
          SHA: ${{ env.CI_SHA }}
          PR_NUMBER: ${{ env.CI_PR_NUMBER }}
          PR_HEAD_SHA: ${{ env.CI_PR_HEAD_SHA }}
          PR_TARGET_BRANCH: ${{ env.CI_BASE_REF }}
          MERGE_GROUP_BASE_REF: ${{ env.CI_MERGE_GROUP_BASE_REF }}
        run: |
          set -euo pipefail

          callback_url=""
          callback_token=""
          pipeline_id=""

          if [[ -n "$INPUT_CALLBACK_URL" && -n "$INPUT_CALLBACK_TOKEN" ]]; then
            callback_url="$INPUT_CALLBACK_URL"
            callback_token="$INPUT_CALLBACK_TOKEN"
          elif [[ -n "$FOREMAN_API_TOKEN" && ( "$EVENT_NAME" == "push" || "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "merge_group" ) ]]; then
            app_id="${REPOSITORY#*/}"

            payload="$(jq -nc \
              --arg app_id "$app_id" \
              --arg repo "$REPOSITORY" \
              --arg ref "$REF" \
              --arg sha "$SHA" \
              --arg event_name "$EVENT_NAME" \
              --arg pr_number "$PR_NUMBER" \
              --arg pr_head_sha "$PR_HEAD_SHA" \
              --arg pr_target_branch "$PR_TARGET_BRANCH" \
              --arg merge_group_base_ref "$MERGE_GROUP_BASE_REF" \
              '{
                app_id: $app_id,
                params: (
                  {
                    repo: $repo,
                    ref: (
                      if $event_name == "pull_request" and $pr_number != "" then
                        "refs/pull/\($pr_number)/head"
                      else
                        $ref
                      end
                    ),
                    sha: (
                      if $event_name == "pull_request" and $pr_head_sha != "" then
                        $pr_head_sha
                      else
                        $sha
                      end
                    ),
                    native_github_ci: "true"
                  }
                  + (
                    if $event_name == "pull_request" and $pr_number != "" then
                      {
                        pr_number: $pr_number,
                        pr_target_branch: $pr_target_branch
                      }
                    elif $event_name == "merge_group" and $merge_group_base_ref != "" then
                      {
                        pr_target_branch: $merge_group_base_ref
                      }
                    else
                      {}
                    end
                  )
                )
              }')"

            if register_response="$(curl \
              --silent \
              --show-error \
              --fail \
              --retry 3 \
              --retry-all-errors \
              --request POST \
              --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              "${FOREMAN_BASE_URL%/}/api/pipelines/external")"; then
              callback_url="$(printf '%s' "$register_response" | jq -r '.callback_url // ""')"
              callback_token="$(printf '%s' "$register_response" | jq -r '.callback_token // ""')"
              pipeline_id="$(printf '%s' "$register_response" | jq -r '.pipeline_id // ""')"

            else
              echo "::warning::Failed to register this workflow run in Foreman."
            fi
          else
            echo "No Foreman callback destination configured for this event."
          fi

          if [[ -z "$pipeline_id" && -n "$callback_url" ]]; then
            pipeline_id="$(printf '%s' "$callback_url" | sed -nE 's#^.*/api/pipelines/([0-9a-fA-F-]+)/callback/?$#\1#p')"
          fi

          if [[ -n "$callback_token" ]]; then
            echo "::add-mask::$callback_token"
          fi

          {
            echo "callback_url=$callback_url"
            echo "callback_token=$callback_token"
            echo "pipeline_id=$pipeline_id"
          } >> "$GITHUB_OUTPUT"

      - name: Report workflow run URL
        if: steps.prepare.outputs.callback_url != '' && steps.prepare.outputs.callback_token != ''
        shell: bash
        env:
          CALLBACK_URL: ${{ steps.prepare.outputs.callback_url }}
          CALLBACK_TOKEN: ${{ steps.prepare.outputs.callback_token }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          set -euo pipefail

          payload="$(printf '{\"log_url\":\"%s\"}' "$RUN_URL")"

          curl \
            --silent \
            --show-error \
            --fail \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${CALLBACK_URL%/}/log_url"

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 0 — Gate & Triage                                       ║
  # ╚════════════════════════════════════════════════════════════════╝

  gate:
    name: "Gate"
    runs-on: ubuntu-latest
    if: >-
      !(env.CI_EVENT_NAME == 'pull_request_target' && !github.event.pull_request.merged) &&
      !(env.CI_EVENT_NAME == 'pull_request' && env.CI_PR_DRAFT == 'true')
    outputs:
      # ── Event classification ────────────────────────────────────
      is_push: ${{ steps.classify.outputs.is_push }}
      is_pr: ${{ steps.classify.outputs.is_pr }}
      is_merge_queue: ${{ steps.classify.outputs.is_merge_queue }}
      is_tag: ${{ steps.classify.outputs.is_tag }}
      is_release_tag: ${{ steps.classify.outputs.is_release_tag }}
      is_backport: ${{ steps.classify.outputs.is_backport }}
      is_dependabot: ${{ steps.classify.outputs.is_dependabot }}
      is_master: ${{ steps.classify.outputs.is_master }}
      is_scheduled: ${{ steps.classify.outputs.is_scheduled }}
      run_level: ${{ steps.finalize.outputs.run_level }}
      # ── Per-project change flags ────────────────────────────────
      archived_changed: ${{ steps.changes.outputs.archived_changed }}
      cgit_changed: ${{ steps.changes.outputs.cgit_changed }}
      ci_changed: ${{ steps.changes.outputs.ci_changed }}
      cmark_changed: ${{ steps.changes.outputs.cmark_changed }}
      corebinutils_changed: ${{ steps.changes.outputs.corebinutils_changed }}
      forgewrapper_changed: ${{ steps.changes.outputs.forgewrapper_changed }}
      genqrcode_changed: ${{ steps.changes.outputs.genqrcode_changed }}
      hooks_changed: ${{ steps.changes.outputs.hooks_changed }}
      images4docker_changed: ${{ steps.changes.outputs.images4docker_changed }}
      json4cpp_changed: ${{ steps.changes.outputs.json4cpp_changed }}
      libnbtplusplus_changed: ${{ steps.changes.outputs.libnbtplusplus_changed }}
      meshmc_changed: ${{ steps.finalize.outputs.meshmc_changed }}
      meta_changed: ${{ steps.changes.outputs.meta_changed }}
      mnv_changed: ${{ steps.changes.outputs.mnv_changed }}
      neozip_changed: ${{ steps.changes.outputs.neozip_changed }}
      tomlplusplus_changed: ${{ steps.changes.outputs.tomlplusplus_changed }}
      github_changed: ${{ steps.changes.outputs.github_changed }}
      root_changed: ${{ steps.changes.outputs.root_changed }}
      changed_projects: ${{ steps.changes.outputs.changed_projects }}
      changed_count: ${{ steps.changes.outputs.changed_count }}
      # ── Commit parsing ──────────────────────────────────────────
      commit_type: ${{ steps.changes.outputs.commit_type }}
      commit_scope: ${{ steps.changes.outputs.commit_scope }}
      commit_subject: ${{ steps.changes.outputs.commit_subject }}
      commit_breaking: ${{ steps.changes.outputs.commit_breaking }}
      commit_message: ${{ steps.changes.outputs.commit_message }}
      # ── Build config ────────────────────────────────────────────
      build_type: ${{ steps.classify.outputs.build_type }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
        with:
          fetch-depth: 0

      - name: Classify event
        id: classify
        env:
          GH_HEAD_REF: ${{ env.CI_HEAD_REF }}
          GH_BASE_REF: ${{ env.CI_BASE_REF }}
        run: |
          # shellcheck disable=SC2129
          set -euo pipefail

          REF="${{ env.CI_REF }}"
          EVENT="${{ env.CI_EVENT_NAME }}"
          ACTOR="${{ env.CI_ACTOR }}"
          HEAD_REF="${GH_HEAD_REF:-}"

          # ── Booleans ──────────────────────────────────────────
          {
            echo "is_push=$([[ "$EVENT" == "push" ]] && echo true || echo false)"
            echo "is_pr=$([[ "$EVENT" == "pull_request" || "$EVENT" == "pull_request_target" ]] && echo true || echo false)"
            echo "is_merge_queue=$([[ "$EVENT" == "merge_group" ]] && echo true || echo false)"
            echo "is_tag=$([[ "$REF" == refs/tags/* ]] && echo true || echo false)"
            echo "is_release_tag=$([[ "$REF" =~ ^refs/tags/(meshmc|neozip|mnv|cmark|forgewrapper)- ]] && echo true || echo false)"
            echo "is_backport=$([[ "$HEAD_REF" == backport-* || "$HEAD_REF" == backport/* ]] && echo true || echo false)"
            echo "is_dependabot=$([[ "$ACTOR" == "dependabot[bot]" ]] && echo true || echo false)"
            echo "is_master=$([[ "$REF" == "refs/heads/master" || "$REF" == "refs/heads/main" ]] && echo true || echo false)"
            echo "is_scheduled=false"
          } >> "$GITHUB_OUTPUT"

          # ── Run level ─────────────────────────────────────────
          # preliminary full candidates are finalized after change analysis
          # full    = merge queue, tags, master push, manual force-all
          # standard = normal PR, branch push
          # minimal  = dependabot, backport, draft
          if [[ "$EVENT" == "merge_group" ]] || \
             [[ "$REF" == refs/tags/* ]] || \
             ([[ "$EVENT" == "push" ]] && [[ "$REF" == "refs/heads/master" || "$REF" == "refs/heads/main" ]]) || \
             [[ "${{ env.FORCE_ALL }}" == "true" ]]; then
            echo "run_level=full" >> "$GITHUB_OUTPUT"
          elif [[ "$ACTOR" == "dependabot[bot]" ]]; then
            echo "run_level=minimal" >> "$GITHUB_OUTPUT"
          elif [[ "$HEAD_REF" == backport-* ]]; then
            echo "run_level=standard" >> "$GITHUB_OUTPUT"
          else
            echo "run_level=standard" >> "$GITHUB_OUTPUT"
          fi

          # ── Build type ────────────────────────────────────────
          if [[ "$REF" == refs/tags/* ]]; then
            echo "build_type=Release" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.build-type || '' }}" ]]; then
            echo "build_type=${{ github.event.inputs.build-type }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_type=Debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: changes
        if: github.event_name != 'pull_request_target'
        uses: ./.github/actions/change-analysis
        with:
          event-name: ${{ env.CI_EVENT_NAME }}
          base-sha: ${{ env.CI_PR_BASE_SHA }}
          head-sha: ${{ env.CI_PR_HEAD_SHA }}
          before-sha: ${{ env.CI_BEFORE_SHA }}
          current-sha: ${{ env.CI_SHA }}
          pr-title: ${{ env.CI_PR_TITLE }}

      - name: Finalize gate outputs
        id: finalize
        shell: bash
        env:
          BASE_RUN_LEVEL: ${{ steps.classify.outputs.run_level }}
          IS_PUSH: ${{ steps.classify.outputs.is_push }}
          IS_MASTER: ${{ steps.classify.outputs.is_master }}
          CHANGED_PROJECTS: ${{ steps.changes.outputs.changed_projects || '' }}
          ROOT_CHANGED: ${{ steps.changes.outputs.root_changed || 'false' }}
          MESHMC_CHANGED: ${{ steps.changes.outputs.meshmc_changed || 'false' }}
        run: |
          set -euo pipefail

          run_level="$BASE_RUN_LEVEL"
          meshmc_changed="$MESHMC_CHANGED"

          if [[ "$CHANGED_PROJECTS" =~ (^|,)(archived|cgit|cmark|corebinutils|forgewrapper|genqrcode|hooks|images4docker|json4cpp|libnbtplusplus|meshmc|meta|mnv|neozip|tomlplusplus)(,|$) ]]; then
            has_project_changes=true
          else
            has_project_changes=false
          fi

          if [[ "$IS_PUSH" == "true" ]] && [[ "$IS_MASTER" == "true" ]] && [[ "$BASE_RUN_LEVEL" == "full" ]] && [[ "$has_project_changes" == "false" ]]; then
            run_level=standard
          fi

          if [[ "$IS_PUSH" == "true" ]] && [[ "$IS_MASTER" == "true" ]] && [[ "$ROOT_CHANGED" == "true" ]]; then
            meshmc_changed=true
          fi

          echo "run_level=$run_level" >> "$GITHUB_OUTPUT"
          echo "meshmc_changed=$meshmc_changed" >> "$GITHUB_OUTPUT"

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Lint & Commit Checks (fast, blocks everything)      ║
  # ╚════════════════════════════════════════════════════════════════╝

  lint:
    name: "Lint"
    needs: gate
    if: needs.gate.outputs.is_pr == 'true'
    uses: ./.github/workflows/ci-lint.yml
    permissions:
      contents: read
      security-events: write
    with:
      run-level: ${{ needs.gate.outputs.run_level }}
      changed-projects: ${{ needs.gate.outputs.changed_projects }}
    secrets: inherit

  dependency-review:
    name: "Dependency Review"
    needs: gate
    if: needs.gate.outputs.is_pr == 'true'
    uses: ./.github/workflows/repo-dependency-review.yml
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2 — Per-Project Build & Test Matrices                   ║
  # ║                                                                ║
  # ║  Each project runs only when its directory changed, or when    ║
  # ║  force-all / merge-queue / master push triggers them all.      ║
  # ║  Inner reusable workflows handle their own matrices.           ║
  # ╚════════════════════════════════════════════════════════════════╝

  # ── C / System Projects ─────────────────────────────────────────
  mnv:
    name: "MNV"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.mnv_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/mnv-ci.yml
    permissions:
      contents: read
    secrets: inherit

  cgit:
    name: "CGit"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.cgit_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/cgit-ci.yml
    permissions:
      contents: read
    secrets: inherit

  cmark:
    name: "CMark"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.cmark_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/cmark-ci.yml
    permissions:
      contents: read
    secrets: inherit

  corebinutils:
    name: "CoreBinutils"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.corebinutils_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/corebinutils-ci.yml
    permissions:
      contents: read
    secrets: inherit

  genqrcode:
    name: "GenQRCode"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.genqrcode_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/genqrcode-ci.yml
    permissions:
      contents: read
    secrets: inherit

  neozip:
    name: "NeoZip"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.neozip_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/neozip-ci.yml
    permissions:
      contents: read
      actions: read
      security-events: write
    secrets: inherit

  # ── C++ / Library Projects ──────────────────────────────────────
  json4cpp:
    name: "JSON4CPP"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.json4cpp_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/json4cpp-ci.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit

  libnbtplusplus:
    name: "libNBT++"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.libnbtplusplus_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/libnbtplusplus-ci.yml
    permissions:
      contents: read
    secrets: inherit

  tomlplusplus:
    name: "TOML++"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.tomlplusplus_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/tomlplusplus-ci.yml
    permissions:
      contents: read
    secrets: inherit

  # ── Java / Minecraft Projects ───────────────────────────────────
  meshmc:
    name: "MeshMC"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.meshmc_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/meshmc-build.yml
    with:
      build-type: ${{ needs.gate.outputs.build_type }}
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets: inherit

  forgewrapper:
    name: "ForgeWrapper"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.forgewrapper_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/forgewrapper-build.yml
    permissions:
      contents: read
    secrets: inherit

  # ── Container & Docker ──────────────────────────────────────────
  images4docker:
    name: "Docker Images"
    needs: [gate, lint]
    if: >-
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.gate.outputs.images4docker_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/images4docker-build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Extended Analysis (only on full runs)               ║
  # ║                                                                ║
  # ║  Fuzz testing, CodeQL, static analysis — expensive jobs that   ║
  # ║  run on merge queue, master, or manual dispatch only.          ║
  # ╚════════════════════════════════════════════════════════════════╝

  cmark-fuzz:
    name: "CMark Fuzz"
    needs: [gate, cmark]
    if: >-
      always() &&
      !cancelled() &&
      needs.cmark.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.cmark_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/cmark-fuzz.yml
    permissions:
      contents: read
    secrets: inherit

  json4cpp-fuzz:
    name: "JSON4CPP Fuzz"
    needs: [gate, json4cpp]
    if: >-
      always() &&
      !cancelled() &&
      needs.json4cpp.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.json4cpp_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/json4cpp-fuzz.yml
    permissions:
      contents: read
    secrets: inherit

  json4cpp-amalgam:
    name: "JSON4CPP Amalgamation"
    needs: [gate, json4cpp]
    if: >-
      always() &&
      !cancelled() &&
      needs.json4cpp.result == 'success' &&
      (needs.gate.outputs.json4cpp_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/json4cpp-amalgam.yml
    permissions:
      contents: read
    secrets: inherit

  tomlplusplus-fuzz:
    name: "TOML++ Fuzz"
    needs: [gate, tomlplusplus]
    if: >-
      always() &&
      !cancelled() &&
      needs.tomlplusplus.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.tomlplusplus_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/tomlplusplus-fuzz.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit

  neozip-fuzz:
    name: "NeoZip Fuzz"
    needs: [gate, neozip]
    if: >-
      always() &&
      !cancelled() &&
      needs.neozip.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.neozip_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/neozip-fuzz.yml
    permissions:
      contents: read
    secrets: inherit

  meshmc-codeql:
    name: "MeshMC CodeQL"
    needs: [gate, meshmc]
    if: >-
      always() &&
      !cancelled() &&
      needs.meshmc.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.meshmc_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/meshmc-codeql.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit

  mnv-codeql:
    name: "MNV CodeQL"
    needs: [gate, mnv]
    if: >-
      always() &&
      !cancelled() &&
      needs.mnv.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.mnv_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/mnv-codeql.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit

  neozip-codeql:
    name: "NeoZip CodeQL"
    needs: [gate, neozip]
    if: >-
      always() &&
      !cancelled() &&
      needs.neozip.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.neozip_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/neozip-codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Containers & Nix (only on full + meshmc changes)    ║
  # ╚════════════════════════════════════════════════════════════════╝

  meshmc-container:
    name: "MeshMC Container"
    needs: [gate, meshmc]
    if: >-
      always() &&
      !cancelled() &&
      needs.meshmc.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.meshmc_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/meshmc-container.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  meshmc-nix:
    name: "MeshMC Nix"
    needs: [gate, meshmc]
    if: >-
      always() &&
      !cancelled() &&
      needs.meshmc.result == 'success' &&
      needs.gate.outputs.run_level == 'full' &&
      (needs.gate.outputs.meshmc_changed == 'true' || needs.gate.outputs.run_level == 'full')
    uses: ./.github/workflows/meshmc-nix.yml
    permissions:
      contents: read
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — Documentation (master push only)                    ║
  # ╚════════════════════════════════════════════════════════════════╝

  json4cpp-docs:
    name: "JSON4CPP Docs"
    needs: [gate, json4cpp]
    if: >-
      always() &&
      !cancelled() &&
      needs.json4cpp.result == 'success' &&
      needs.gate.outputs.is_master == 'true' &&
      needs.gate.outputs.is_push == 'true' &&
      needs.gate.outputs.json4cpp_changed == 'true'
    uses: ./.github/workflows/json4cpp-publish-docs.yml
    permissions:
      contents: write
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 6 — Backport Automation (PR merge events)               ║
  # ╚════════════════════════════════════════════════════════════════╝

  backport:
    name: "Backport"
    needs: gate
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      contains(toJSON(github.event.pull_request.labels.*.name), 'backport')
    uses: ./.github/workflows/meshmc-backport.yml
    permissions:
      contents: write
      pull-requests: write
      actions: write
    secrets: inherit

  merge-blocking:
    name: "Merge Blocking PR"
    needs: gate
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      contains(toJSON(github.event.pull_request.labels.*.name), 'status: blocking')
    uses: ./.github/workflows/meshmc-merge-blocking-pr.yml
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 7 — Release (tag pushes only)                           ║
  # ╚════════════════════════════════════════════════════════════════╝

  neozip-release:
    name: "NeoZip Release"
    needs: gate
    if: >-
      needs.gate.outputs.is_tag == 'true' &&
      startsWith(github.ref, 'refs/tags/neozip-')
    uses: ./.github/workflows/neozip-release.yml
    permissions:
      contents: write
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  STAGE 8 — Final Verdicts                                      ║
  # ║                                                                ║
  # ║  Merge queue and branch protection rules check this job.       ║
  # ║  It collects results from all stages and reports pass/fail.    ║
  # ╚════════════════════════════════════════════════════════════════╝

  verdict:
    name: "CI Verdict"
    if: always()
    needs:
      - gate
      - lint
      - mnv
      - cgit
      - cmark
      - corebinutils
      - genqrcode
      - neozip
      - json4cpp
      - libnbtplusplus
      - tomlplusplus
      - meshmc
      - forgewrapper
      - images4docker
      - cmark-fuzz
      - json4cpp-fuzz
      - json4cpp-amalgam
      - tomlplusplus-fuzz
      - neozip-fuzz
      - meshmc-codeql
      - mnv-codeql
      - neozip-codeql
      - meshmc-container
      - meshmc-nix
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          # shellcheck disable=SC2129
          set -euo pipefail

          {
            echo "## CI Verdict"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false

          check_job() {
            local name="$1"
            local result="$2"
            local icon="⬜"
            case "$result" in
              success)  icon="✅" ;;
              failure)  icon="❌"; FAILED=true ;;
              cancelled) icon="⏹️" ;;
              skipped)  icon="⏭️" ;;
            esac
            echo "| $name | $icon $result |" >> "$GITHUB_STEP_SUMMARY"
          }

          check_job "Gate"           "${{ needs.gate.result }}"
          check_job "Lint"           "${{ needs.lint.result }}"
          check_job "MNV"            "${{ needs.mnv.result }}"
          check_job "CGit"           "${{ needs.cgit.result }}"
          check_job "CMark"          "${{ needs.cmark.result }}"
          check_job "CoreBinutils"   "${{ needs.corebinutils.result }}"
          check_job "GenQRCode"      "${{ needs.genqrcode.result }}"
          check_job "NeoZip"         "${{ needs.neozip.result }}"
          check_job "JSON4CPP"       "${{ needs.json4cpp.result }}"
          check_job "libNBT++"       "${{ needs.libnbtplusplus.result }}"
          check_job "TOML++"         "${{ needs.tomlplusplus.result }}"
          check_job "MeshMC"         "${{ needs.meshmc.result }}"
          check_job "ForgeWrapper"   "${{ needs.forgewrapper.result }}"
          check_job "Docker Images"  "${{ needs.images4docker.result }}"
          check_job "CMark Fuzz"     "${{ needs.cmark-fuzz.result }}"
          check_job "JSON4CPP Fuzz"  "${{ needs.json4cpp-fuzz.result }}"
          check_job "JSON4CPP Amalg" "${{ needs.json4cpp-amalgam.result }}"
          check_job "TOML++ Fuzz"    "${{ needs.tomlplusplus-fuzz.result }}"
          check_job "NeoZip Fuzz"    "${{ needs.neozip-fuzz.result }}"
          check_job "MeshMC CodeQL"  "${{ needs.meshmc-codeql.result }}"
          check_job "MNV CodeQL"     "${{ needs.mnv-codeql.result }}"
          check_job "NeoZip CodeQL"  "${{ needs.neozip-codeql.result }}"
          check_job "MeshMC Docker"  "${{ needs.meshmc-container.result }}"
          check_job "MeshMC Nix"     "${{ needs.meshmc-nix.result }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$FAILED" == "true" ]]; then
            echo "**Result: FAILED** — one or more required jobs failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**Result: PASSED** — all executed jobs succeeded." >> "$GITHUB_STEP_SUMMARY"
          fi

  callback-status:
    name: "Callback Status"
    needs: [callback-start, verdict]
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'merge_group'
      )
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Report final workflow status
        shell: bash
        env:
          CALLBACK_URL: ${{ needs.callback-start.outputs.callback_url }}
          PIPELINE_ID: ${{ needs.callback-start.outputs.pipeline_id }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          VERDICT_RESULT: ${{ needs.verdict.result }}
        run: |
          set -euo pipefail

          if [[ -z "$PIPELINE_ID" || -z "$FOREMAN_API_TOKEN" ]]; then
            echo "Callback pipeline/admin token missing; skipping callback status report."
            exit 0
          fi

          case "$VERDICT_RESULT" in
            success)
              pipeline_status="success"
              ;;
            cancelled)
              pipeline_status="cancelled"
              ;;
            *)
              pipeline_status="failure"
              ;;
          esac

          payload="$(printf '{\"status\":\"%s\"}' "$pipeline_status")"

          curl \
            --silent \
            --show-error \
            --fail \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${FOREMAN_BASE_URL%/}/api/pipelines/${PIPELINE_ID}/admin-callback/status"

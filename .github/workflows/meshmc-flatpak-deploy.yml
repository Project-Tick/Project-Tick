name: Deploy to repository

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""

permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ github.event.inputs.callback_url || '' }}
          callback_token: ${{ github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    name: Build Flatpaks
    needs: callback-start
    defaults:
      run:
        working-directory: meshmc/flatpak
    outputs:
      repository-cache-key: ${{ steps.restore-repository.outputs.cache-primary-key }}
      repository-directory: ${{ env.REPOSITORY_PATH }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
      volumes:
        - /opt/hostedtoolcache:/hostedtoolcache
    env:
      GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY != '' && vars.GPG_KEY_ID || '' }}
      REPOSITORY_DIR: repo
      REPOSITORY_PATH: meshmc/flatpak/repo
    steps:
      - name: Free up disk space
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          rm -rf /hostedtoolcache/*

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set short version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPSTREAM_SHA="$(gh api /repos/Project-Tick/Project-Tick/branches/master --jq '.commit.sha')"
          echo "VERSION=${UPSTREAM_SHA::7}" >> "$GITHUB_ENV"

      - name: Restore local repository
        id: restore-repository
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.REPOSITORY_PATH }}
          key: repository-${{ github.run_id }}-${{ runner.arch }}
          restore-keys: repository-

      - name: Setup signing
        shell: bash
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY || '' }}
        run: |
          if [[ -z "$FLATPAK_GPG_PRIVATE_KEY" ]]; then
            echo ":warning: Not signing Flatpaks or ostree repositories, as the signing key was not present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo -n "$FLATPAK_GPG_PRIVATE_KEY" | base64 -d | gpg --import
            gpg --list-keys --keyid-format=long "$GPG_KEY_ID"
          fi

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@0a631396999e4243489a8a6ecf54fcb9f0575078
        with:
          manifest-path: meshmc/flatpak/org.projecttick.MeshMC.yml
          arch: ${{ matrix.arch }}
          branch: nightly
          bundle: MeshMC-${{ env.VERSION }}-${{ matrix.arch }}.flatpak
          repo-dir: ${{ env.REPOSITORY_PATH }}
          gpg-sign: ${{ env.GPG_KEY_ID }}

      - name: Update and prune repository
        shell: bash
        run: |
          flatpak build-update-repo \
            "${GPG_KEY_ID:+--gpg-sign="$GPG_KEY_ID"}" \
            --generate-static-deltas \
            --prune \
            "$REPOSITORY_DIR"

      - name: Copy static assets to repository
        shell: bash
        run: |
          cp -r static/. "$REPOSITORY_DIR"/

      - name: Cache local repository
        uses: actions/cache/save@v5
        with:
          path: ${{ env.REPOSITORY_PATH }}
          key: ${{ steps.restore-repository.outputs.cache-primary-key }}

  deploy:
    name: Publish Flatpak repository

    needs: build

    runs-on: ubuntu-24.04

    env:
      DEPLOY_BRANCH: ${{ vars.FLATPAK_DEPLOY_BRANCH || 'master' }}
      DEPLOY_GIT_EMAIL: ${{ vars.FLATPAK_DEPLOY_GIT_EMAIL || 'bot@projecttick.org' }}
      DEPLOY_GIT_NAME: ${{ vars.FLATPAK_DEPLOY_GIT_NAME || 'Project Tick Bot' }}
      DEPLOY_REPOSITORY: ${{ vars.FLATPAK_DEPLOY_REPOSITORY || '' }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.FLATPAK_DEPLOY_SSH_PRIVATE_KEY || secrets.FTP_SSH_PRIVATE_KEY || '' }}
      SOURCE_REPOSITORY: ${{ needs.build.outputs.repository-directory }}

    steps:
      - name: Restore local repository
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.SOURCE_REPOSITORY }}
          key: ${{ needs.build.outputs.repository-cache-key }}
          fail-on-cache-miss: true

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$DEPLOY_REPOSITORY" ]]; then
            echo "::error::Missing repository variable FLATPAK_DEPLOY_REPOSITORY (SSH URL of the target deployment repository)."
            exit 1
          fi

          if [[ -z "$DEPLOY_SSH_PRIVATE_KEY" ]]; then
            echo "::error::Missing secret FLATPAK_DEPLOY_SSH_PRIVATE_KEY. You can also reuse FTP_SSH_PRIVATE_KEY."
            exit 1
          fi

          if [[ ! -d "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY" ]]; then
            echo "::error::Flatpak repository directory was not restored: $GITHUB_WORKSPACE/$SOURCE_REPOSITORY"
            exit 1
          fi

      - name: Prepare SSH credentials
        shell: bash
        run: |
          set -euo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config << 'EOF'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
          EOF

          chmod 600 ~/.ssh/config

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.name "$DEPLOY_GIT_NAME"
          git config --global user.email "$DEPLOY_GIT_EMAIL"

      - name: Push repository contents
        shell: bash
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          git init -b "$DEPLOY_BRANCH" "$deploy_dir"

          cd "$deploy_dir"
          git remote add origin "$DEPLOY_REPOSITORY"

          rsync -a --delete --exclude '.git' "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY/" ./
          git add -A

          local_tree="$(git write-tree)"
          remote_tree=''

          if git fetch --depth=1 origin "$DEPLOY_BRANCH"; then
            remote_tree="$(git rev-parse FETCH_HEAD^{tree})"
          fi

          if [[ -n "$remote_tree" && "$local_tree" == "$remote_tree" ]]; then
            echo "Flatpak repository is already up to date."
            exit 0
          fi

          git commit -m "Publish Flatpak repository for ${GITHUB_SHA::7}"
          git push --force origin "HEAD:$DEPLOY_BRANCH"

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - build
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

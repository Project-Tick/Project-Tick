name: Deploy to repository

on:
  schedule:
    # Run daily
    - cron: "58 1 * * *"
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""

permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ github.event.inputs.callback_url || '' }}
          callback_token: ${{ github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    name: Build Flatpaks
    needs: callback-start
    permissions:
      contents: read
    uses: ./.github/workflows/meshmc-flatpak-build.yml
    with:
      cache-repository: true
    secrets: inherit

  deploy:
    name: Publish Flatpak repository

    needs: build

    runs-on: ubuntu-24.04

    env:
      DEPLOY_BRANCH: ${{ vars.FLATPAK_DEPLOY_BRANCH || 'master' }}
      DEPLOY_GIT_EMAIL: ${{ vars.FLATPAK_DEPLOY_GIT_EMAIL || 'bot@projecttick.org' }}
      DEPLOY_GIT_NAME: ${{ vars.FLATPAK_DEPLOY_GIT_NAME || 'Project Tick Bot' }}
      DEPLOY_REPOSITORY: ${{ vars.FLATPAK_DEPLOY_REPOSITORY || '' }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.FLATPAK_DEPLOY_SSH_PRIVATE_KEY || secrets.FTP_SSH_PRIVATE_KEY || '' }}
      SOURCE_REPOSITORY: ${{ needs.build.outputs.repository-directory }}

    steps:
      - name: Restore local repository
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.SOURCE_REPOSITORY }}
          key: ${{ needs.build.outputs.repository-cache-key }}
          fail-on-cache-miss: true

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$DEPLOY_REPOSITORY" ]]; then
            echo "::error::Missing repository variable FLATPAK_DEPLOY_REPOSITORY (SSH URL of the target deployment repository)."
            exit 1
          fi

          if [[ -z "$DEPLOY_SSH_PRIVATE_KEY" ]]; then
            echo "::error::Missing secret FLATPAK_DEPLOY_SSH_PRIVATE_KEY. You can also reuse FTP_SSH_PRIVATE_KEY."
            exit 1
          fi

          if [[ ! -d "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY" ]]; then
            echo "::error::Flatpak repository directory was not restored: $GITHUB_WORKSPACE/$SOURCE_REPOSITORY"
            exit 1
          fi

      - name: Prepare SSH credentials
        shell: bash
        run: |
          set -euo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config << 'EOF'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
          EOF

          chmod 600 ~/.ssh/config

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.name "$DEPLOY_GIT_NAME"
          git config --global user.email "$DEPLOY_GIT_EMAIL"

      - name: Push repository contents
        shell: bash
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          git init -b "$DEPLOY_BRANCH" "$deploy_dir"

          cd "$deploy_dir"
          git remote add origin "$DEPLOY_REPOSITORY"

          rsync -a --delete --exclude '.git' "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY/" ./
          git add -A

          local_tree="$(git write-tree)"
          remote_tree=''

          if git fetch --depth=1 origin "$DEPLOY_BRANCH"; then
            remote_tree="$(git rev-parse FETCH_HEAD^{tree})"
          fi

          if [[ -n "$remote_tree" && "$local_tree" == "$remote_tree" ]]; then
            echo "Flatpak repository is already up to date."
            exit 0
          fi

          git commit -m "Publish Flatpak repository for ${GITHUB_SHA::7}"
          git push --force origin "HEAD:$DEPLOY_BRANCH"

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - build
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

name: "MeshMC: Nix"

concurrency:
  group: meshmc-nix-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions: {}

env:
  DEBUG: ${{ github.ref_type != 'tag' }}

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    needs: callback-start
    name: Build (${{ matrix.system }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux

          - os: ubuntu-22.04-arm
            system: aarch64-linux

          - os: macos-14
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: meshmc

    steps:
      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Nix Magic Cache
        if: ${{ github.event_name == 'pull_request' }}
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - name: Setup Cachix
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: cachix/cachix-action@v17
        with:
          name: meshmc
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run Flake checks
        run: |
          nix flake check --print-build-logs --show-trace

      - name: Build debug package
        if: ${{ env.DEBUG == 'true' }}
        run: |
          nix build \
            --no-link --print-build-logs --print-out-paths \
            .#meshmc-debug >> "$GITHUB_STEP_SUMMARY"

      - name: Build release package
        if: ${{ env.DEBUG == 'false' }}
        env:
          TAG: ${{ github.ref_name }}
          SYSTEM: ${{ matrix.system }}
        run: |
          nix build --no-link --print-out-paths .#meshmc \
            | tee -a "$GITHUB_STEP_SUMMARY" \
            | xargs cachix pin meshmc "$TAG"-"$SYSTEM"

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

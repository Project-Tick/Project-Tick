name: "genqrcode: CI"

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  cmake:
    needs: callback-start
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      BUILD_TYPE: Release
    defaults:
      run:
        working-directory: genqrcode
        shell: bash
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Install vcpkg deps (Windows)
        if: matrix.os == 'windows-latest'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '77df67cfff9c12ccfdb52284e07c87c75092f723'
      - name: Install vcpkg packages (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install getopt:x64-windows libiconv:x64-windows libpng:x64-windows
      - name: Install deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpng-dev
      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install pkg-config libpng
      - name: Configure CMake
        if: matrix.os != 'windows-latest'
        run: cmake -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DWITH_TESTS=yes -DBUILD_SHARED_LIBS=on -S . -B build
      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DWITH_TESTS=yes -S . -B build
      - name: Build
        run: cmake --build build --config "$BUILD_TYPE" -j 2
      - name: Test
        run: ctest --test-dir build -C "$BUILD_TYPE"

  autotools:
    needs: callback-start
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: genqrcode
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install automake autoconf libtool pkg-config libpng
      - name: Generate configure
        run: ./autogen.sh
      - name: Configure
        run: ./configure --with-tests
      - name: Build
        run: make -j 2
      - name: Test
        run: make check
      - name: Distcheck
        run: make -j 2 distcheck

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - cmake
      - autotools
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

name: "tomlplusplus: CI"

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

concurrency:
  group: tomlplusplus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  clang_version: "14"
  gcc_version: "11"

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  linux:
    needs: callback-start
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - "clang"
          - "gcc"
        linker:
          - "lld"
        type:
          - "debug"
          - "release"

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: tomlplusplus

    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Install base dependencies
        working-directory: .
        run: |
          sudo apt -y update
          sudo apt -y install --no-install-recommends git ninja-build libstdc++-${{ env.gcc_version }}-dev locales-all

      - name: Install python dependencies
        run: |
          pip3 install --user --no-cache-dir --upgrade meson
          pip3 install --user --no-cache-dir --upgrade -r tools/requirements.txt

      - name: Check toml.hpp
        run: |
          cd tools
          python3 ci_single_header_check.py

      - name: Install lld
        if: ${{ startsWith(matrix.linker, 'lld') }}
        run: |
          sudo apt -y install --no-install-recommends lld-${{ env.clang_version }}
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${{ env.clang_version }} 1000

      - name: Install clang
        if: ${{ startsWith(matrix.compiler, 'clang') }}
        run: |
          sudo apt -y install --no-install-recommends clang-${{ env.clang_version }}
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-${{ env.clang_version }} 1000
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-${{ env.clang_version }} 1000

      - name: Install gcc
        if: ${{ startsWith(matrix.compiler, 'gcc') }}
        run: |
          sudo apt -y install --no-install-recommends gcc-${{ env.gcc_version }} g++-${{ env.gcc_version }}
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-${{ env.gcc_version }} 1000
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-${{ env.gcc_version }} 1000

      - name: Configure locales
        run: |
          sudo locale-gen 'en_US.utf8' 'ja_JP.utf8' 'de_DE.utf8' 'it_IT.utf8' 'tr_TR.utf8' 'fi_FI.utf8' 'fr_FR.utf8' 'zh_CN.utf8'

      - name: Configure Meson
        run: |
          CXX=c++ CXX_LD=${{ matrix.linker }} meson setup build --buildtype=${{ matrix.type }} -Ddevel=true -Db_lto=false

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  windows:
    needs: callback-start
    strategy:
      fail-fast: false
      matrix:
        type:
          - "debug"
          - "release"
        permissive:
          - false
          - true
        arch:
          - name: "x64"
            runner: "windows-2022"
          - name: "arm64"
            runner: "windows-11-arm"
    runs-on: ${{ matrix.arch.runner }}

    defaults:
      run:
        shell: cmd
        working-directory: tomlplusplus

    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Install dependencies
        working-directory: .
        run: |
          python3 -m pip install -U pip
          pip3 install meson ninja

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch.name }}

      - name: Configure Meson
        run: meson setup build --vsenv --buildtype=${{ matrix.type }} -Ddevel=true -Db_lto=false -Dpermissive=${{ matrix.permissive }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - linux
      - windows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

name: "neozip: Fuzz"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  fuzzing:
    name: Fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Build Fuzzers
        id: build
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
        with:
          dry-run: false
          language: c++

      - name: Run Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
        with:
          fuzz-seconds: 600
          dry-run: false
          language: c++

      - name: Upload Crash
        uses: actions/upload-artifact@v7
        if: failure() && steps.build.outcome == 'success'
        with:
          name: neozip-fuzz-artifacts
          path: ./out/artifacts

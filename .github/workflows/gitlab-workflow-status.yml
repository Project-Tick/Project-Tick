name: Report GitLab workflow status

on:
  workflow_run:
    workflows:
      - 'AUR: Update meshmc'
      - 'cgit: CI'
      - 'Lint & Checks'
      - 'Scheduled CI'
      - 'CI'
      - 'Close PRs to master'
      - 'cmark: CI'
      - 'cmark: Fuzz'
      - 'corebinutils: CI'
      - 'ForgeWrapper: Build'
      - 'genqrcode: CI'
      - 'images4docker: Build'
      - 'Action CI'
      - 'Docker images'
      - 'Test build with published image'
      - 'json4cpp: Comment Check Amalgamation'
      - 'json4cpp: Check amalgamation'
      - 'json4cpp: CI'
      - 'json4cpp: Flawfinder'
      - 'json4cpp: Fuzz'
      - 'json4cpp: Publish documentation'
      - 'json4cpp: Semgrep'
      - 'libnbtplusplus: CI'
      - 'MeshMC: Backport'
      - 'Blocked/Stacked Pull Requests Automation'
      - 'MeshMC: Build'
      - 'MeshMC: CodeQL'
      - 'MeshMC: Container'
      - 'MeshMC: Update Flake'
      - 'Build'
      - 'Deploy to repository'
      - 'Update modules'
      - 'Merged Blocking Pull Request Automation'
      - 'MeshMC: Nix'
      - 'mnv: CI'
      - 'mnv: CodeQL'
      - 'mnv: Coverity'
      - 'mnv: Check Links'
      - 'neozip: Static Analysis'
      - 'neozip: CMake'
      - 'neozip: CodeQL'
      - 'neozip: Configure'
      - 'neozip: Fuzz'
      - 'neozip: Libpng'
      - 'neozip: Link'
      - 'neozip: Lint'
      - 'neozip: OSB'
      - 'neozip: Pigz'
      - 'neozip: Package Check'
      - 'neozip: Release'
      - 'Release: Package Source Archives'
      - 'Dependency Review'
      - 'Labeler'
      - 'Scorecard supply-chain security'
      - 'Stale: Comment and close stale issues and PRs'
      - 'tomlplusplus: CI'
      - 'tomlplusplus: Fuzz'
      - 'tomlplusplus: gh-pages'
    types:
      - requested
      - in_progress
      - completed

permissions: {}

jobs:
  report:
    if: ${{ github.event.workflow_run.name != 'Report GitLab status' && github.event.workflow_run.name != 'Report GitLab workflow status' && !(github.event.workflow_run.name == 'CI' && github.event.workflow_run.event == 'workflow_dispatch') }}
    name: Report external status
    runs-on: ubuntu-24.04
    steps:
      - name: Post status to GitLab
        shell: bash
        env:
          GITLAB_URL: ${{ vars.GITLAB_STATUS_BASE_URL || 'https://git.projecttick.org' }}
          GITLAB_PROJECT: ${{ vars.GITLAB_STATUS_PROJECT || '' }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_STATUS_TOKEN }}
          GITLAB_SHA: ${{ github.event.workflow_run.head_sha }}
          GITLAB_REF: ${{ github.event.workflow_run.head_branch || '' }}
          GITLAB_STATE: ${{ github.event.action == 'requested' && 'pending' || github.event.action == 'in_progress' && 'running' || github.event.workflow_run.conclusion == 'success' && 'success' || github.event.workflow_run.conclusion == 'skipped' && 'skipped' || github.event.workflow_run.conclusion == 'neutral' && 'skipped' || (github.event.workflow_run.conclusion == 'cancelled' || github.event.workflow_run.conclusion == 'stale') && 'canceled' || 'failed' }}
          GITLAB_NAME: ${{ format('github-actions/{0}', github.event.workflow_run.name) }}
          GITLAB_DESCRIPTION: ${{ github.event.action == 'requested' && 'Workflow queued on GitHub Actions' || github.event.action == 'in_progress' && 'Workflow running on GitHub Actions' || github.event.workflow_run.conclusion == 'success' && 'Workflow succeeded on GitHub Actions' || github.event.workflow_run.conclusion == 'skipped' && 'Workflow skipped on GitHub Actions' || github.event.workflow_run.conclusion == 'neutral' && 'Workflow completed neutrally on GitHub Actions' || (github.event.workflow_run.conclusion == 'cancelled' || github.event.workflow_run.conclusion == 'stale') && 'Workflow cancelled on GitHub Actions' || 'Workflow failed on GitHub Actions' }}
          GITLAB_TARGET_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          if [[ -z "$GITLAB_PROJECT" || -z "$GITLAB_TOKEN" ]]; then
            echo "::notice::Skipping GitLab status update because GITLAB_STATUS_PROJECT or GITLAB_STATUS_TOKEN is not configured."
            exit 0
          fi

          if [[ -z "$GITLAB_SHA" || "$GITLAB_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "::notice::Skipping GitLab status update because the commit SHA is not usable."
            exit 0
          fi

          case "$GITLAB_STATE" in
            pending|running|success|failed|canceled|skipped)
              ;;
            *)
              echo "::warning::Skipping GitLab status update because state '$GITLAB_STATE' is invalid."
              exit 0
              ;;
          esac

          gitlab_ref="$GITLAB_REF"
          if [[ "$gitlab_ref" == refs/heads/* ]]; then
            gitlab_ref="${gitlab_ref#refs/heads/}"
          elif [[ "$gitlab_ref" == refs/tags/* ]]; then
            gitlab_ref="${gitlab_ref#refs/tags/}"
          fi

          project_path="$GITLAB_PROJECT"
          if [[ "$project_path" == */* ]]; then
            project_path="${project_path//\//%2F}"
          fi

          endpoint="${GITLAB_URL%/}/api/v4/projects/$project_path/statuses/$GITLAB_SHA"
          response_file="$(mktemp)"

          cleanup() {
            rm -f "$response_file"
          }
          trap cleanup EXIT

          curl_args=(
            --silent
            --show-error
            --output "$response_file"
            --write-out '%{http_code}'
            --request POST
            --header "PRIVATE-TOKEN: $GITLAB_TOKEN"
            --data-urlencode "state=$GITLAB_STATE"
            --data-urlencode "name=$GITLAB_NAME"
          )

          if [[ -n "$gitlab_ref" ]]; then
            curl_args+=(--data-urlencode "ref=$gitlab_ref")
          fi

          if [[ -n "$GITLAB_DESCRIPTION" ]]; then
            curl_args+=(--data-urlencode "description=$GITLAB_DESCRIPTION")
          fi

          if [[ -n "$GITLAB_TARGET_URL" ]]; then
            curl_args+=(--data-urlencode "target_url=$GITLAB_TARGET_URL")
          fi

          http_code=''
          for attempt in 1 2 3 4; do
            http_code="$(curl "${curl_args[@]}" "$endpoint" || true)"

            if [[ "$http_code" == '200' || "$http_code" == '201' ]]; then
              echo "Reported GitLab status '$GITLAB_STATE' for '$GITLAB_NAME'."
              exit 0
            fi

            if [[ "$http_code" == '409' && "$attempt" -lt 4 ]]; then
              echo "::warning::GitLab status update hit HTTP 409, retrying (attempt $attempt)."
              sleep "$attempt"
              continue
            fi

            break
          done

          response_body="$(tr '\n' ' ' < "$response_file" | head -c 400 || true)"
          echo "::warning::GitLab status update failed with HTTP ${http_code:-000}. ${response_body:-No response body returned.}"
          exit 0
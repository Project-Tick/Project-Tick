name: Action CI

on:
  workflow_dispatch:
    inputs:
      emit-callbacks:
        description: Whether this standalone run should report callbacks to Foreman
        type: boolean
        default: true
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      emit-callbacks:
        description: Whether this reusable invocation should report callbacks to Foreman
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

env:
  # Match with docker image
  PYTHON_VERSION: "3.12"

jobs:
  callback-start:
    name: "Callback Start"
    if: ${{ inputs.emit-callbacks }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v2

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  ci:
    defaults:
      run:
        working-directory: infra/merge-action
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-${{ matrix.platform }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
        # 4.2.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        # 5.4.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install dependencies
        run: |
           sudo apt-get update && sudo apt-get install -y \
            --no-install-recommends libcairo2-dev \
                libgirepository1.0-dev libcairo2 libgirepository-1.0-1 \
                gir1.2-json-1.0

      - name: Install python dependencies
        run: uv sync -v --all-groups --frozen

      - name: Check code formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check --output-format=github

      - name: Check python types
        run: uv run mypy .

  docker:
    needs: ci
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: amd64
          - os: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{matrix.os}}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ${{ matrix.platform }}-docker_build
      cancel-in-progress: true
    steps:
        # 4.2.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 3.10.0
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to ghcr.io
        # 3.4.0
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # 6.15.0
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: infra/merge-action
          file: infra/merge-action/Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/project-tick/infra/merge:${{ github.sha }}-${{ matrix.platform }}
            ghcr.io/project-tick/infra/merge:latest-${{ matrix.platform }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

  docker-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docker
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        # 3.4.0
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create \
            ghcr.io/project-tick/infra/merge:${{ github.sha }} \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-amd64 \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-arm64

          docker manifest push ghcr.io/project-tick/infra/merge:${{ github.sha }}

          docker manifest create \
            ghcr.io/project-tick/infra/merge:latest \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-amd64 \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-arm64

          docker manifest push ghcr.io/project-tick/infra/merge:latest

  callback-status:
    name: "Callback Status"
    if: ${{ inputs.emit-callbacks && always() }}
    needs:
      - callback-start
      - ci
      - docker
      - docker-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v2

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}

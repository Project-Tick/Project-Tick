name: Action CI

on:
  push:
    branches: master
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - 'README.md'
      - 'action.yml'
  pull_request:
    branches: master
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - 'README.md'
      - 'action.yml'
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  schedule:
    - cron: '0 0 * * 1,5'

env:
  # Match with docker image
  PYTHON_VERSION: "3.12"

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      callback_token_b64: ${{ steps.prepare.outputs.callback_token_b64 }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ github.event.inputs.callback_url || '' }}
          callback_token: ${{ github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  ci:
    needs: callback-start
    defaults:
      run:
        working-directory: infra/merge-action
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-${{ matrix.platform }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
        # 4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        # 5.4.0
        uses: astral-sh/setup-uv@22695119d769bdb6f7032ad67b9bca0ef8c4a174
        with:
          version: "0.7.5"
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install dependencies
        run: |
           sudo apt-get update && sudo apt-get install -y \
            --no-install-recommends libcairo2-dev \
                libgirepository1.0-dev libcairo2 libgirepository-1.0-1 \
                gir1.2-json-1.0

      - name: Install python dependencies
        run: uv sync -v --all-groups --frozen

      - name: Check code formatting
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check --output-format=github

      - name: Check python types
        run: uv run mypy .

  docker:
    needs: ci
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: amd64
          - os: ubuntu-24.04-arm
            platform: arm64
    runs-on: ${{matrix.os}}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ${{ matrix.platform }}-docker_build
      cancel-in-progress: true
    steps:
        # 4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 3.10.0
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Login to ghcr.io
        # 3.4.0
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # 6.15.0
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: infra/merge-action
          file: infra/merge-action/Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/project-tick/infra/merge:${{ github.sha }}-${{ matrix.platform }}
            ghcr.io/project-tick/infra/merge:latest-${{ matrix.platform }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

  docker-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docker
    if: ${{ github.ref == 'refs/heads/master' && github.event_name != 'pull_request' }}
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        # 3.4.0
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create \
            ghcr.io/project-tick/infra/merge:${{ github.sha }} \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-amd64 \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-arm64

          docker manifest push ghcr.io/project-tick/infra/merge:${{ github.sha }}

          docker manifest create \
            ghcr.io/project-tick/infra/merge:latest \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-amd64 \
            --amend ghcr.io/project-tick/infra/merge:${{ github.sha }}-arm64

          docker manifest push ghcr.io/project-tick/infra/merge:latest

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - ci
      - docker
      - docker-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          callback_token_b64: ${{ needs.callback-start.outputs.callback_token_b64 }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

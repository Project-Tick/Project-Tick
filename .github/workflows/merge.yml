on:
  issue_comment:
    types: [created]

jobs:
  merge:
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '/merge') }}
    runs-on: ubuntu-latest
    steps:
      - uses: project-tick/project-tick/infra/merge-action@a637f0d447db0ba5aba1f42167ca26dc4f97e621
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          ssh_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

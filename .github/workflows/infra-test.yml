name: "Test build with published image"

on:
  workflow_dispatch:
    inputs:
      emit-callbacks:
        description: Whether this standalone run should report callbacks to Foreman
        type: boolean
        default: true
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      emit-callbacks:
        description: Whether this reusable invocation should report callbacks to Foreman
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

env:
  TEST_APPID: io.github.herve4m.Length
  MANIFEST_NAME: io.github.herve4m.Length.yaml

jobs:
  callback-start:
    name: "Callback Start"
    if: ${{ inputs.emit-callbacks }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.pull_request.number || '' }}
          pr_head_sha: ${{ github.event.pull_request.head.sha || '' }}
          pr_target_branch: ${{ github.event.pull_request.base.ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  actions_tagged:
    permissions: {}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - name: Clone the app
        run: |
          git clone --depth=1 --branch master --single-branch --recursive https://github.com/flathub/${{ env.TEST_APPID }}.git
          cd ${{ env.TEST_APPID }} && rm -rf ".git"

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          build-bundle: false
          upload-artifact: false
          cache: false
          restore-cache: false
          manifest-path: ${{ env.TEST_APPID }}/${{ env.MANIFEST_NAME }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
          branch: stable
          mirror-screenshots-url: https://dl.flathub.org/media

      - name: Run linter
        run: |
          flatpak-builder-lint --exceptions --debug manifest ${{ env.TEST_APPID }}/${{ env.MANIFEST_NAME }}
          flatpak-builder-lint --exceptions --debug builddir flatpak_app
          flatpak-builder-lint --exceptions --debug repo repo

      - name: Install
        run: |
          flatpak install --user -y --no-related --no-deps --reinstall ./repo ${{ env.TEST_APPID }}

      - name: Info
        run: |
          flatpak info ${{ env.TEST_APPID }}

  actions_master:
    permissions: {}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - name: Clone the app
        run: |
          git clone --depth=1 --branch master --single-branch --recursive https://github.com/flathub/${{ env.TEST_APPID }}.git
          cd ${{ env.TEST_APPID }} && rm -rf ".git"

      - uses: flatpak/flatpak-github-actions/flatpak-builder@master
        with:
          build-bundle: false
          upload-artifact: false
          cache: false
          restore-cache: false
          manifest-path: ${{ env.TEST_APPID }}/${{ env.MANIFEST_NAME }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
          branch: stable
          mirror-screenshots-url: https://dl.flathub.org/media

      - name: Run linter
        run: |
          flatpak-builder-lint --exceptions --debug manifest ${{ env.TEST_APPID }}/${{ env.MANIFEST_NAME }}
          flatpak-builder-lint --exceptions --debug builddir flatpak_app
          flatpak-builder-lint --exceptions --debug repo repo

      - name: Install
        run: |
          flatpak install --user -y --no-related --no-deps --reinstall ./repo ${{ env.TEST_APPID }}

      - name: Info
        run: |
          flatpak info ${{ env.TEST_APPID }}

  callback-status:
    name: "Callback Status"
    if: ${{ inputs.emit-callbacks && always() }}
    needs:
      - callback-start
      - actions_tagged
      - actions_master
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}

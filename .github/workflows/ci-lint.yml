# Fast lint & commit checks — called from ci.yml before builds start.

name: "Lint & Checks"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      run-level:
        description: "minimal | standard | full"
        required: true
        type: string
      changed-projects:
        description: "Comma-separated list of changed projects"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # reuse:
  #   name: "REUSE Compliance"

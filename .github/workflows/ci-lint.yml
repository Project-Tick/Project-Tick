# Fast lint & commit checks — called from ci.yml before builds start.

name: "Lint & Checks"

on:
  workflow_call:
    inputs:
      run-level:
        description: "minimal | standard | full"
        required: true
        type: string
      changed-projects:
        description: "Comma-separated list of changed projects"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # ── Commit message lint (Conventional Commits) ──────────────────
  commit-lint:
    name: "Commit Messages"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ci/github-script
        run: npm ci

      - name: Lint commit messages
        uses: actions/github-script@v9
        with:
          script: |
            const lint = require('./ci/github-script/lint-commits.js')
            await lint({ github, context, core, repoPath: '.' })

  # ── REUSE / license compliance ──────────────────────────────────
  reuse:
    name: "REUSE Compliance"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v6

  # ── Whitespace & formatting checks ─────────────────────────────
  whitespace:
    name: "Whitespace"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Check trailing whitespace
        run: |
          set -euo pipefail
          ERRORS=$(git diff --check HEAD~1 HEAD -- \
            ':!*.patch' \
            ':!*/test/data/*' \
            ':!*.ico' \
            ':!*.png' \
            ':!*.jpg' \
            ':!*.gif' \
            ':!*.bin' \
            ':!*.7z' \
            ':!*.zip' \
            ':!*.gz' \
            ':!*.lock' \
            2>/dev/null || true)
          if [[ -n "$ERRORS" ]]; then
            echo "::warning::Whitespace issues found:"
            echo "$ERRORS"
          fi

  # ── Actionlint (validate all workflow YAML) ─────────────────────
  actionlint:
    name: "Actionlint"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true

  # ── Biome (JS/TS formatting) ─────────────────────────────────────
  biome:
    name: "Biome (JS/TS)"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Biome
        run: npm install --global @biomejs/biome

      - name: Check formatting
        run: |
          biome check \
            --formatter-enabled=true \
            --linter-enabled=false \
            --organize-imports-enabled=false \
            --no-errors-on-unmatched \
            ci/github-script/

  # ── yamlfmt (YAML formatting) ────────────────────────────────────
  yamlfmt:
    name: "yamlfmt"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install yamlfmt
        run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest

      - name: Check YAML formatting
        run: |
          yamlfmt -dry -lint \
            -conf /dev/null \
            -formatter retain_line_breaks=true \
            $(find .github/workflows -name "*.yml" -o -name "*.yaml" | head -200)

  # ── zizmor (GitHub Actions security) ────────────────────────────
  zizmor:
    name: "zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: woodruffw/zizmor-action@v1
        with:
          sarif-file: zizmor.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

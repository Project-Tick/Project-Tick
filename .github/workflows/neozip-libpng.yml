name: "neozip: Libpng"

on:
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  libpng:
    needs: callback-start
    name: Ubuntu Clang
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
        with:
          show-progress: 'false'

      - name: Generate project files (neozip)
        run: |
          cmake -S neozip -B build-neozip \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF
        env:
          CC: clang
          CFLAGS: -fPIC
          CI: true

      - name: Compile source code (neozip)
        run: cmake --build build-neozip -j5 --config Release

      - name: Checkout repository (libpng)
        uses: actions/checkout@v6
        with:
          repository: glennrp/libpng
          path: libpng
          show-progress: 'false'

      - name: Generate project files (libpng)
        run: |
          cmake -S libpng -B build-libpng \
            -DCMAKE_BUILD_TYPE=Release \
            -DPNG_TESTS=ON \
            -DPNG_STATIC=OFF \
            -DZLIB_INCLUDE_DIR=${{ github.workspace }}/neozip \
            -DZLIB_LIBRARY=${{ github.workspace }}/build-neozip/libz.a
        env:
          CC: clang
          CI: true

      - name: Compile source code (libpng)
        run: cmake --build build-libpng -j5 --config Release

      - name: Run test cases (libpng)
        run: ctest -j5 -C Release --output-on-failure --max-width 120
        working-directory: build-libpng

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - libpng
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

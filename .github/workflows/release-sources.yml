name: "Release: Package Source Archives"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version string override. Defaults to source-ref or the workflow ref name."
        required: false
      source-ref:
        description: "Optional source ref to package (for example refs/tags/v1.2.3)"
        required: false
        type: string
        default: ""
      emit-callbacks:
        description: Whether this standalone run should report callbacks to Foreman
        required: false
        type: boolean
        default: true
      beta_source_only:
        description: "Beta release: skip MeshMC binary build, package source artifacts only"
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      version:
        description: "Version string override. Defaults to the caller ref name."
        required: false
        type: string
        default: ""
      source-ref:
        description: "Optional source ref to package (for example refs/tags/v1.2.3)"
        required: false
        type: string
        default: ""
      emit-callbacks:
        description: Whether this reusable invocation should report callbacks to Foreman
        required: false
        type: boolean
        default: false
      beta_source_only:
        description: "Beta release: skip MeshMC binary build, package source artifacts only"
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions: {}

jobs:

  callback-start:
    name: "Callback Start"
    if: ${{ inputs.emit-callbacks }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}

      - name: Resolve source revision
        id: source
        shell: bash
        env:
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          set -euo pipefail
          echo "ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ steps.source.outputs.ref }}
          sha: ${{ steps.source.outputs.sha }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  meshmc_build:
    name: MeshMC Build
    if: ${{ !inputs.beta_source_only }}
    uses: ./.github/workflows/meshmc-release.yml
    with:
      source-ref: ${{ inputs.source-ref }}
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets: inherit


  neozip_build:
    name: neozip Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC Win32
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32
            deploy-name: win-x86

          - name: Windows MSVC Win32 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32 -DZLIB_COMPAT=ON
            deploy-name: win-x86-compat

          - name: Windows MSVC Win64
            os: windows-latest
            compiler: cl
            cmake-args: -A x64
            deploy-name: win-x86-64

          - name: Windows MSVC Win64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A x64 -DZLIB_COMPAT=ON
            deploy-name: win-x86-64-compat

          - name: Windows MSVC ARM
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0
            deploy-name: win-arm

          - name: Windows MSVC ARM Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0 -DZLIB_COMPAT=ON
            deploy-name: win-arm-compat

          - name: Windows MSVC ARM64
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64
            deploy-name: win-arm64

          - name: Windows MSVC ARM64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64 -DZLIB_COMPAT=ON
            deploy-name: win-arm64-compat

          - name: Windows MSVC ARM64EC
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC
            deploy-name: win-arm64ec

          - name: Windows MSVC ARM64EC Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC -DZLIB_COMPAT=ON
            deploy-name: win-arm64ec-compat

    steps:
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          show-progress: 'false'

      - name: Install Windows 11 SDK (ARM)
        if: matrix.name == 'Windows MSVC ARM' || matrix.name == 'Windows MSVC ARM Compat'
        run: |
          # Windows 11 SDK (10.0.22621.2428)
          # https://developer.microsoft.com/en-us/windows/downloads/sdk-archive/index-legacy
          Invoke-WebRequest -Method Get -Uri https://go.microsoft.com/fwlink/p/?LinkId=2250105 -OutFile sdksetup.exe -UseBasicParsing
          Unblock-File sdksetup.exe
          Start-Process -Wait sdksetup.exe -ArgumentList "/q", "/norestart", "/ceip off"

      - name: Generate project files
        shell: bash
        working-directory: neozip
        run: |
          cmake . ${{ matrix.cmake-args }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_ENABLE_TESTS=ON \
            -DCMAKE_INSTALL_PREFIX=out \
            -DINSTALL_UTILS=ON
        env:
          CC: ${{ matrix.compiler }}
          CI: true

      - name: Compile source code
        working-directory: neozip
        run: cmake --build . -j5 --config Release --target install

      - name: Package release
        working-directory: neozip/out
        run: 7z a -tzip ../neozip-${{ matrix.deploy-name }}.zip bin include lib ../LICENSE.md ../PORTING.md ../README.md

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: neozip-${{ matrix.deploy-name }}
          path: neozip/neozip-${{ matrix.deploy-name }}.zip
          if-no-files-found: error

  meshmc_prepare_source:
    name: MeshMC Source Archives
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          submodules: recursive

      - name: Set version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          set -euo pipefail
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${SOURCE_REF#refs/tags/}"
            version="${version#refs/heads/}"
          fi
          if [[ -z "$version" ]]; then
            version="$GITHUB_REF_NAME"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Patch CMakeLists.txt for bundled libraries
        shell: bash
        run: |
          git apply .github/patches/0001-GHA-RELEASE-Prepare-tarball-with-libraries-in-CMake.patch

      - name: Prepare source tree
        id: prepare
        uses: ./.github/actions/prepare-source-tree
        with:
          project: meshmc
          bundle-libraries: |
            classparser:libraries/classparser
            cmark:libraries/cmark
            ganalytics:libraries/ganalytics
            iconfix:libraries/iconfix
            javacheck:libraries/javacheck
            javalauncher:libraries/launcher
            katabasis:libraries/katabasis
            libnbtplusplus:libraries/libnbtplusplus
            LocalPeer:libraries/LocalPeer
            neozip:libraries/neozip
            optional-bare:libraries/optional-bare
            rainbow:libraries/rainbow
            systeminfo:libraries/systeminfo
            xz-embedded:libraries/xz-embedded

      - name: Package source archives
        uses: ./.github/actions/package-source
        with:
          project: meshmc
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: meshmc-source-archives
          path: release-artifacts/
          if-no-files-found: error

  package_sources:
    name: Source Archives (${{ matrix.project }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - cgit
          - cmark
          - corebinutils
          - forgewrapper
          - genqrcode
          - images4docker
          - json4cpp
          - libnbtplusplus
          - mnv
          - tomlplusplus
          - LocalPeer
          - classparser
          - ganalytics
          - iconfix
          - javacheck
          - javalauncher
          - katabasis
          - optional-bare
          - rainbow
          - systeminfo
          - xz-embedded
          - neozip

    steps:
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          submodules: recursive

      - name: Set version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          set -euo pipefail
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${SOURCE_REF#refs/tags/}"
            version="${version#refs/heads/}"
          fi
          if [[ -z "$version" ]]; then
            version="$GITHUB_REF_NAME"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Prepare source tree
        id: prepare
        uses: ./.github/actions/prepare-source-tree
        with:
          project: ${{ matrix.project }}

      - name: Package source archives
        uses: ./.github/actions/package-source
        with:
          project: ${{ matrix.project }}
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: source-${{ matrix.project }}
          path: release-artifacts/
          if-no-files-found: error


  create_release:
    name: Create Release
    needs: [meshmc_build, neozip_build, meshmc_prepare_source, package_sources]
    if: |
      always() &&
      (needs.meshmc_build.result == 'success' || needs.meshmc_build.result == 'skipped') &&
      needs.neozip_build.result == 'success' &&
      needs.meshmc_prepare_source.result == 'success' &&
      needs.package_sources.result == 'success'

    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for component version extraction)
        uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}

      - name: Set version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          set -euo pipefail
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${SOURCE_REF#refs/tags/}"
            version="${version#refs/heads/}"
          fi
          if [[ -z "$version" ]]; then
            version="$GITHUB_REF_NAME"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Generate components.json
        shell: bash
        run: |
          # Extract MeshMC version from CMakeLists.txt
          MESHMC_MAJOR=$(grep 'set(MeshMC_VERSION_MAJOR' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_MINOR=$(grep 'set(MeshMC_VERSION_MINOR' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_HOTFIX=$(grep 'set(MeshMC_VERSION_HOTFIX' meshmc/CMakeLists.txt | sed 's/[^0-9]//g')
          MESHMC_VER="${MESHMC_MAJOR}.${MESHMC_MINOR}.${MESHMC_HOTFIX}"

          # Extract neozip version from zlib.h.in
          NEOZIP_VER=$(grep '#define NEOZIP_VERSION' neozip/zlib.h.in | sed 's/.*"\(.*\)".*/\1/')

          RELEASE_DATE=$(date -u +%Y-%m-%d)

          cat > components.json <<EOF
          {
            "schema_version": 1,
            "release_tag": "${{ env.VERSION }}",
            "release_date": "${RELEASE_DATE}",
            "components": {
              "meshmc": {
                "version": "${MESHMC_VER}"
              },
              "neozip": {
                "version": "${NEOZIP_VER}"
              }
            }
          }
          EOF

          # Remove leading whitespace from heredoc
          python3 -c "
          import json, sys
          with open('components.json') as f:
              data = json.load(f)
          with open('components.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          echo "=== components.json ==="
          cat components.json

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      # ── MeshMC binary packaging ──────────────────────────────────
      - name: Package MeshMC binary artifacts
        if: ${{ !inputs.beta_source_only }}
        run: |
          # shellcheck disable=SC2086,SC2035
          mv MeshMC-Linux-Portable*/MeshMC-portable.tar.gz MeshMC-Linux-Portable-${{ env.VERSION }}.tar.gz
          mv MeshMC-Linux-aarch64-Portable*/MeshMC-portable.tar.gz MeshMC-Linux-aarch64-Portable-${{ env.VERSION }}.tar.gz
          mv MeshMC-*.AppImage/MeshMC-*-x86_64.AppImage MeshMC-Linux-x86_64.AppImage
          mv MeshMC-*.AppImage.zsync/MeshMC-*-x86_64.AppImage.zsync MeshMC-Linux-x86_64.AppImage.zsync
          mv MeshMC-*.AppImage/MeshMC-*-aarch64.AppImage MeshMC-Linux-aarch64.AppImage
          mv MeshMC-*.AppImage.zsync/MeshMC-*-aarch64.AppImage.zsync MeshMC-Linux-aarch64.AppImage.zsync
          mv MeshMC-macOS*/MeshMC.zip MeshMC-macOS-${{ env.VERSION }}.zip
          mv MeshMC-macOS*/MeshMC.dmg MeshMC-macOS-${{ env.VERSION }}.dmg

          for d in MeshMC-Windows-MSVC*; do
            cd "${d}" || continue
            LEGACY="$(echo -n "${d}" | grep -o Legacy || true)"
            ARM64="$(echo -n "${d}" | grep -o arm64 || true)"
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MSVC"
            test -z "${LEGACY}" || NAME="${NAME}-Legacy"
            test -z "${ARM64}" || NAME="${NAME}-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

          for d in MeshMC-Windows-MinGW-w64*; do
            cd "${d}" || continue
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MinGW-w64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

          for d in MeshMC-Windows-MinGW-arm64*; do
            cd "${d}" || continue
            INST="$(echo -n "${d}" | grep -o Setup || true)"
            PORT="$(echo -n "${d}" | grep -o Portable || true)"
            NAME="MeshMC-Windows-MinGW-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv MeshMC-*.exe "../${NAME}-Setup-${{ env.VERSION }}.exe"
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" -- *
            cd ..
          done

      # ── Stage deployment bundle ──────────────────────────────────
      - name: Stage deployment bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-bundle

          # MeshMC — packaged binaries (files only, not artifact dirs) + source archives
          mkdir -p deploy-bundle/meshmc
          if [[ "${{ inputs.beta_source_only }}" != 'true' ]]; then
            find . -maxdepth 1 -type f -name 'MeshMC-*' -exec cp {} deploy-bundle/meshmc/ \;
          fi
          cp -a meshmc-source-archives/. deploy-bundle/meshmc/

          # NeoZip — binary artifacts + source archives
          mkdir -p deploy-bundle/neozip
          for d in neozip-win-*; do
            [[ -d "$d" ]] || continue
            cp -a "$d"/. deploy-bundle/neozip/
          done
          cp -a source-neozip/. deploy-bundle/neozip/

          # Source-only projects (from package_sources matrix)
          for project in cgit cmark corebinutils forgewrapper genqrcode images4docker json4cpp libnbtplusplus mnv tomlplusplus LocalPeer classparser ganalytics iconfix javacheck javalauncher katabasis optional-bare rainbow systeminfo xz-embedded; do
            if [[ -d "source-${project}" ]]; then
              mkdir -p "deploy-bundle/${project}"
              cp -a "source-${project}"/. "deploy-bundle/${project}/"
            fi
          done

          # Include components.json at root level
          cp components.json deploy-bundle/

          # Generate SHA-256 checksums for all files in the deploy bundle
          find deploy-bundle -type f ! -name '*.sha256' | while read -r f; do
            sha256sum "$f" > "${f}.sha256"
          done

          echo "=== Deployment bundle ==="
          find deploy-bundle -type f | sort

      # TODO: refactor this!
      - name: Upload deployment bundle
        uses: actions/upload-artifact@v7
        with:
          name: deploy-bundle
          path: deploy-bundle/
          if-no-files-found: error

      - name: Set version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          set -euo pipefail
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${SOURCE_REF#refs/tags/}"
            version="${version#refs/heads/}"
          fi
          if [[ -z "$version" ]]; then
            version="$GITHUB_REF_NAME"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download deployment bundle
        uses: actions/download-artifact@v8
        with:
          name: deploy-bundle
          path: deploy-bundle

      - name: Prepare SSH credentials
        shell: bash
        env:
          FTP_SSH_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_SSH_PORT || '22' }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$FTP_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$FTP_PORT" -H "$FTP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy artifacts to server
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PORT: ${{ secrets.FTP_SSH_PORT || '22' }}
          REMOTE_BASE: /var/www/ftp/Project-Tick
        run: |
          set -euo pipefail

          # Deploy components.json to release base directory
          if [[ -f deploy-bundle/components.json ]]; then
            ssh -p "$FTP_PORT" "$FTP_USER@$FTP_HOST" "mkdir -p '${REMOTE_BASE}'"
            rsync -av --chmod=F644 \
              -e "ssh -p ${FTP_PORT} -o StrictHostKeyChecking=yes" \
              deploy-bundle/components.json \
              "${FTP_USER}@${FTP_HOST}:${REMOTE_BASE}/components-${VERSION}.json"
          fi

          # Deploy per-product artifacts
          for product_dir in deploy-bundle/*/; do
            [[ -d "$product_dir" ]] || continue
            product="$(basename "$product_dir")"
            remote="${REMOTE_BASE}/${product}/releases/download/${VERSION}"

            echo "::group::Deploying ${product} → ${remote}"
            ssh -p "$FTP_PORT" "$FTP_USER@$FTP_HOST" "mkdir -p '${remote}'"
            rsync -av --chmod=D755,F644 \
              -e "ssh -p ${FTP_PORT} -o StrictHostKeyChecking=yes" \
              "${product_dir}" \
              "${FTP_USER}@${FTP_HOST}:${remote}/"
            echo "::endgroup::"
          done

  callback-status:
    name: "Callback Status"
    if: ${{ inputs.emit-callbacks && always() }}
    needs:
      - callback-start
      - meshmc_build
      - neozip_build
      - meshmc_prepare_source
      - package_sources
      - create_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v1
        with:
          ref: ${{ inputs.source-ref || github.ref }}

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}

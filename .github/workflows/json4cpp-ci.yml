name: "json4cpp: CI"

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: json4cpp-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  ci_test_gcc:
    needs: callback-start
    runs-on: ubuntu-latest
    container: gcc:latest
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v4.3.1
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ci_test_gcc

  ci_static_analysis:
    needs: callback-start
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ci_test_amalgamation, ci_test_single_header, ci_cppcheck, ci_cpplint, ci_reproducible_tests, ci_non_git_tests, ci_offline_testdata, ci_reuse_compliance, ci_test_valgrind]
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Install Valgrind
        run: sudo apt-get update ; sudo apt-get install -y valgrind
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v4.3.1
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ${{ matrix.target }}

  ci_static_analysis_clang:
    needs: callback-start
    runs-on: ubuntu-latest
    container: silkeh/clang:dev
    strategy:
      fail-fast: false
      matrix:
        target: [ci_test_clang, ci_clang_tidy, ci_test_clang_sanitizer, ci_clang_analyze, ci_single_binaries]
    steps:
      - name: Install dependencies
        run: apt-get update ; apt-get install -y git clang-tools iwyu unzip
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v4.3.1
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ${{ matrix.target }}

  ci_test_compilers_gcc:
    needs: callback-start
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: ['7', '8', '9', '10', '11', '12', '13', '14', '15', 'latest']
    container: gcc:${{ matrix.compiler }}
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v4.3.1
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ci_test_compiler_default

  ci_test_compilers_clang:
    needs: callback-start
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: ['11', '12', '13', '14', '15-bullseye', '16', '17', '18', '19', '20', 'latest']
    container: silkeh/clang:${{ matrix.compiler }}
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v4.3.1
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ci_test_compiler_default

  ci_test_coverage:
    needs: callback-start
    runs-on: ubuntu-latest
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake lcov ninja-build locales gcc-multilib g++-multilib
          sudo locale-gen de_DE
          sudo update-locale
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ci_test_coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: build/html

  macos:
    needs: callback-start
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On
      - name: Build
        run: cmake --build build --target ci_test_clang

  windows:
    needs: callback-start
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Run CMake
        run: cmake -S json4cpp -B build -DJSON_CI=On -G "Visual Studio 17 2022"
      - name: Build
        run: cmake --build build --config Release --target ci_test_msvc

  codeql:
    needs: callback-start
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
      - name: Build
        run: |
          cmake -S json4cpp -B build
          cmake --build build
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - ci_test_gcc
      - ci_static_analysis
      - ci_static_analysis_clang
      - ci_test_compilers_gcc
      - ci_test_compilers_clang
      - ci_test_coverage
      - macos
      - windows
      - codeql
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

name: "Uppfinna: Workhorse Verify"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  workhorse-verify:
    name: Workhorse Verify
    runs-on: ubuntu-24.04
    container:
      image: golang:1.25
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/.go/pkg/mod
          key: uppfinna-workhorse-go-${{ runner.os }}-${{ hashFiles(format('{0}/workhorse/go.sum', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-workhorse-go-${{ runner.os }}-

      - name: Build and verify workhorse
        run: |
          export GOPATH="$(pwd)/.go"
          go version
          make -C workhorse
          make -C workhorse verify

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

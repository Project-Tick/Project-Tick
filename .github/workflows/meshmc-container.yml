name: "MeshMC: Container"

concurrency:
  group: meshmc-container-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    needs: callback-start
    name: Build (${{ matrix.arch }})

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image-name.outputs.image-name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu-24.04-arm
          - arch: amd64
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Set image name
        id: image-name
        run: |
          echo "image-name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/project-tick/devcontainer" >> "$GITHUB_OUTPUT"

      - name: Install Podman
        uses: redhat-actions/podman-install@main
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        with:
          github-token: ${{ github.token }}

      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Determine metadata for image
        id: image-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.image-name.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/develop' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./meshmc/Containerfile
          tags: ${{ steps.image-metadata.outputs.tags }}
          labels: ${{ steps.image-metadata.outputs.labels }}

      - name: Login to registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Push image (with retry)
        id: push-image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          digest=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            for attempt in 1 2 3 4 5; do
              if podman push --tls-verify=true \
                   --digestfile="$RUNNER_TEMP/digest.txt" \
                   "$tag"; then
                digest="$(cat "$RUNNER_TEMP/digest.txt")"
                break
              fi
              [ "$attempt" = 5 ] && exit 1
              echo "Push attempt $attempt/5 failed for $tag, retrying in 30s..."
              sleep 30
            done
          done <<< "${{ steps.build-image.outputs.tags }}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Export image digest
        if: ${{ github.event_name != 'pull_request' }}
        env:
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          touch "$RUNNER_TEMP"/digests/"${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Create manifest
    needs: [build]
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Install Podman
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        uses: redhat-actions/podman-install@main
        with:
          github-token: ${{ github.token }}

      - name: Login to registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Determine metadata for manifest
        id: manifest-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ needs.build.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/develop' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          # shellcheck disable=SC2046
          while read -r tag; do
            podman manifest create "$tag" \
              $(printf "$IMAGE_NAME@sha256:%s " *)
          done <<< "$DOCKER_METADATA_OUTPUT_TAGS"

      - name: Push manifest
        uses: redhat-actions/push-to-registry@v2
        with:
          tags: ${{ steps.manifest-metadata.outputs.tags }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
          tls-verify: true

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - build
      - manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

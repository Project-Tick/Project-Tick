name: "Dependency Review"

# Scans dependency manifest changes in every pull request.
# Blocks merging of PRs that introduce known-vulnerable packages.
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

name: "Dependency Review"

# Scans dependency manifest changes in every pull request.
# Blocks merging of PRs that introduce known-vulnerable packages.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

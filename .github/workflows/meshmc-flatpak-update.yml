name: Update modules

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  update:
    name: Run update
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: meshmc/flatpak
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLATPAK_PAT_TOKEN }}

      - name: Run update
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        with:
          args: --update --edit-only meshmc/flatpak/org.projecttick.MeshMC.yml

      - name: Create Pull request
        id: pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-modules
          commit-message: "chore: update modules"
          title: "chore: update modules"
          token: ${{ secrets.FLATPAK_PAT_TOKEN }}

  callback-status:
    name: "Callback Status"
    if: github.event_name != 'workflow_call' && always()
    needs:
      - callback-start
      - update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}

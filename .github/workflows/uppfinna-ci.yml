name: "Uppfinna: GitLab Fork CI"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  rspec-pg16:
    name: RSpec pg16
    uses: ./.github/workflows/uppfinna-rspec-pg16.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  rspec-pg18:
    name: RSpec pg18
    uses: ./.github/workflows/uppfinna-rspec-pg18.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  rspec-valkey:
    name: RSpec valkey
    uses: ./.github/workflows/uppfinna-rspec-valkey.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  rspec-redis70:
    name: RSpec redis70
    uses: ./.github/workflows/uppfinna-rspec-redis70.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  build-cng:
    name: Build CNG
    uses: ./.github/workflows/uppfinna-build-cng.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  cng-build-images:
    name: CNG Build Images
    needs: build-cng
    if: needs.build-cng.result == 'success'
    uses: ./.github/workflows/uppfinna-cng-build-images.yml
    permissions:
      contents: read
    with:
      gitlab-version: ${{ needs.build-cng.outputs.gitlab_version }}
      image-tag: ${{ needs.build-cng.outputs.image_tag }}
      cng-repository: 'https://git.projecttick.org/project-tick/uppfinna/cng'
    secrets: inherit

  deploy:
    name: Deploy
    needs: [build-cng, cng-build-images, rspec-pg16, rspec-pg18, rspec-valkey, rspec-redis70, rubocop, yaml-lint, setup-checks]
    if: |
      vars.DEPLOY_ENABLED == 'true' &&
      needs.build-cng.result == 'success' &&
      needs.cng-build-images.result == 'success' &&
      needs.rspec-pg16.result == 'success' &&
      needs.rspec-pg18.result == 'success' &&
      needs.rspec-valkey.result == 'success' &&
      needs.rspec-redis70.result == 'success' &&
      needs.rubocop.result == 'success' &&
      needs.yaml-lint.result == 'success' &&
      needs.setup-checks.result == 'success'
    uses: ./.github/workflows/uppfinna-deploy.yml
    permissions:
      contents: read
    with:
      image-tag: ${{ needs.build-cng.outputs.image_tag }}
      environment: production
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  setup-checks:
    name: Setup Checks
    uses: ./.github/workflows/uppfinna-setup-checks.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ inputs.foreman-pipeline-id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ inputs.foreman-callback-url }}
      foreman-callback-token: ${{ inputs.foreman-callback-token }}
    secrets: inherit

  gems:

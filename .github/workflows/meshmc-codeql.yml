name: "MeshMC: CodeQL"

concurrency:
  group: meshmc-codeql-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  CodeQL:
    needs: callback-start
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    defaults:
      run:
        working-directory: meshmc

    steps:
      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
        with:
          submodules: "true"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-and-quality
          languages: cpp, java

      - name: Setup dependencies
        uses: ./.github/actions/meshmc/setup-dependencies
        with:
          artifact-name: meshmc-codeql-deps
          build-type: Debug
          qt-version: 6.9.3

      - name: Build and install monorepo libraries (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          # External dependencies from monorepo
          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF
          install_lib cmark
          # tomlplusplus is header-only, installed via system package
          install_lib libnbtplusplus

          # Internal libraries
          install_lib optional-bare
          install_lib xz-embedded
          install_lib systeminfo
          install_lib ganalytics
          install_lib rainbow
          install_lib iconfix
          install_lib LocalPeer
          install_lib classparser
          install_lib katabasis

          # Java jars
          install_lib javacheck
          install_lib javalauncher

      - name: Configure and Build
        run: |
          cmake --preset linux -DLauncher_USE_PCH=OFF
          cmake --build --preset linux --config Debug

      - name: Run tests
        run: |
          ctest --preset linux --build-config Debug --extra-verbose --output-on-failure

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

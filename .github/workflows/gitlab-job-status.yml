name: Report GitLab job status

on:
  workflow_job:
    types:
      - queued
      - in_progress
      - completed

permissions: {}

jobs:
  prepare:
    name: Inspect parent run
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      should_report: ${{ steps.inspect.outputs.should_report }}
    steps:
      - name: Resolve workflow run event
        id: inspect
        uses: actions/github-script@v7
        with:
          script: |
            const ignoredWorkflows = new Set([
              'Report GitLab status',
              'Report GitLab workflow status',
              'Report GitLab job status',
            ])

            const workflowName = context.payload.workflow_job.workflow_name
            if (ignoredWorkflows.has(workflowName)) {
              core.setOutput('should_report', 'false')
              return
            }

            if (workflowName !== 'CI') {
              core.setOutput('should_report', 'true')
              return
            }

            try {
              const response = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_job.run_id,
              })
              core.setOutput(
                'should_report',
                response.data.event === 'workflow_dispatch' ? 'false' : 'true',
              )
            } catch (error) {
              core.warning(`Failed to inspect workflow run ${context.payload.workflow_job.run_id}: ${error.message}`)
              core.setOutput('should_report', 'false')
            }

  report:
    needs: prepare
    if: needs.prepare.outputs.should_report == 'true'
    uses: ./.github/workflows/gitlab-status.yml
    with:
      gitlab-url: ${{ vars.GITLAB_STATUS_BASE_URL || 'https://git.projecttick.org' }}
      project: ${{ vars.GITLAB_STATUS_PROJECT || '' }}
      sha: ${{ github.event.workflow_job.head_sha }}
      ref: ${{ github.event.workflow_job.head_branch || '' }}
      state: ${{ github.event.action == 'queued' && 'pending' || github.event.action == 'in_progress' && 'running' || github.event.workflow_job.conclusion == 'success' && 'success' || github.event.workflow_job.conclusion == 'skipped' && 'skipped' || github.event.workflow_job.conclusion == 'neutral' && 'skipped' || (github.event.workflow_job.conclusion == 'cancelled' || github.event.workflow_job.conclusion == 'stale') && 'canceled' || 'failed' }}
      name: ${{ format('github-actions/job/{0}#{1}', github.event.workflow_job.name, github.event.workflow_job.run_id) }}
      description: ${{ github.event.action == 'queued' && 'Job queued on GitHub Actions' || github.event.action == 'in_progress' && 'Job running on GitHub Actions' || github.event.workflow_job.conclusion == 'success' && 'Job succeeded on GitHub Actions' || github.event.workflow_job.conclusion == 'skipped' && 'Job skipped on GitHub Actions' || github.event.workflow_job.conclusion == 'neutral' && 'Job completed neutrally on GitHub Actions' || (github.event.workflow_job.conclusion == 'cancelled' || github.event.workflow_job.conclusion == 'stale') && 'Job cancelled on GitHub Actions' || 'Job failed on GitHub Actions' }}
      target-url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.event.workflow_job.run_id) }}
    secrets:
      token: ${{ secrets.GITLAB_STATUS_TOKEN }}
name: "libnbtplusplus: CI"

on:
  workflow_dispatch:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          pr_number: ${{ github.event.inputs.pr-number || '' }}
          pr_head_sha: ${{ github.event.inputs.pr-head-sha || '' }}
          pr_target_branch: ${{ github.event.inputs.base-ref || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    needs: callback-start
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shared: [ON, OFF]

    steps:
      - name: Checkout
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master

      - name: Install cxxtest (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cxxtest

      - name: Install cxxtest (macOS)
        if: runner.os == 'macOS'
        run: brew install cxxtest
      
      - name: Build and install monorepo libraries (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          # External dependencies from monorepo
          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF

      - name: Build and install monorepo libraries (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64;x86_64 -DCMAKE_PREFIX_PATH=$(brew --prefix libarchive)"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Configure
        if: runner.os != 'Windows'
        run: |
          cmake -S libnbtplusplus -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=ON \
            -DNBT_BUILD_TESTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S libnbtplusplus -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=OFF \
            -DNBT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release -j2

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  lint-reuse:
    needs: callback-start
    runs-on: ubuntu-latest
    steps:
      - uses: Project-Tick/Project-Tick/.github/actions/source-checkout@master
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v6

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - build
      - lint-reuse
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve final workflow status
        id: resolve-status
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status.outputs.status) }}

# ╔══════════════════════════════════════════════════════════════════╗
# ║  Project Tick — Scheduled Maintenance Orchestrator               ║
# ║                                                                  ║
# ║  Consolidates ALL scheduled jobs into one workflow with a        ║
# ║  matrix dispatch. Each cron entry triggers its own subset.       ║
# ╚══════════════════════════════════════════════════════════════════╝

name: "Scheduled CI"

on:
  schedule:
    # ── Hourly (every hour) ──────────────────────────────────────
    - cron: "0 * * * *"      # [0] hourly-flatpak-update
    # ── Twice weekly (Mon/Fri 00:00 UTC) ────────────────────────
    - cron: "0 0 * * 1,5"    # [1] infra-action
    # ── Daily (01:58 UTC) ───────────────────────────────────────
    - cron: "58 1 * * *"     # [2] daily-flatpak-deploy
    # ── Twice weekly (Mon/Fri 02:00 UTC) ────────────────────────
    - cron: "0 2 * * 1,5"    # [3] infra-docker
    # ── Daily (03:00 UTC) ─────────────────────────────────────────
    - cron: "0 3 * * *"      # [4] daily: stale, coverity, docker
    # ── Weekly Sunday (04:00 UTC) ─────────────────────────────────
    - cron: "0 4 * * 0"      # [5] weekly-sun: link-check, scorecard, flake-update, codeql
    # ── Weekly Wednesday (14:00 UTC) ──────────────────────────────
    - cron: "0 14 * * 3"     # [6] weekly-wed: flawfinder
    # ── Weekly Thursday (02:00 UTC) ───────────────────────────────
    - cron: "0 2 * * 4"      # [7] weekly-thu: semgrep
  workflow_dispatch:
    inputs:
      schedule-group:
        description: "Which schedule group to run"
        type: choice
        options: [hourly-flatpak-update, infra-action, daily-flatpak-deploy, infra-docker, daily, weekly-sun, weekly-wed, weekly-thu, all]
        default: all
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""

permissions:
  contents: read

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare callback destination
        id: prepare
        uses: ./.github/actions/foreman-prepare-callback
        with:
          callback_url: ${{ github.event.inputs.callback_url || '' }}
          callback_token: ${{ github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          callback_token: ${{ steps.prepare.outputs.callback_token }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  # ── Gate: resolve which schedule group to run ───────────────────
  gate:
    name: "Resolve Schedule Group"
    needs: callback-start
    runs-on: ubuntu-latest
    outputs:
      group: ${{ steps.resolve.outputs.group }}
    steps:
      - name: Resolve schedule group
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            GROUP="${{ github.event.inputs.schedule-group }}"
          elif [[ "${{ github.event.schedule }}" == "0 * * * *" ]]; then
            GROUP="hourly-flatpak-update"
          elif [[ "${{ github.event.schedule }}" == "0 0 * * 1,5" ]]; then
            GROUP="infra-action"
          elif [[ "${{ github.event.schedule }}" == "58 1 * * *" ]]; then
            GROUP="daily-flatpak-deploy"
          elif [[ "${{ github.event.schedule }}" == "0 2 * * 1,5" ]]; then
            GROUP="infra-docker"
          elif [[ "${{ github.event.schedule }}" == "0 3 * * *" ]]; then
            GROUP="daily"
          elif [[ "${{ github.event.schedule }}" == "0 4 * * 0" ]]; then
            GROUP="weekly-sun"
          elif [[ "${{ github.event.schedule }}" == "0 14 * * 3" ]]; then
            GROUP="weekly-wed"
          elif [[ "${{ github.event.schedule }}" == "0 2 * * 4" ]]; then
            GROUP="weekly-thu"
          else
            GROUP="all"
          fi
          echo "group=$GROUP" >> "$GITHUB_OUTPUT"
          echo "### Schedule Group: \`$GROUP\`" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Hourly Jobs                                                   ║
  # ╚════════════════════════════════════════════════════════════════╝

  meshmc-flatpak-update:
    name: "MeshMC Flatpak Update"
    needs: gate
    if: contains(fromJSON('["hourly-flatpak-update","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/meshmc-flatpak-update.yml
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Twice-Weekly Infra Jobs                                       ║
  # ╚════════════════════════════════════════════════════════════════╝

  infra-action-ci:
    name: "Infra Action CI"
    needs: gate
    if: contains(fromJSON('["infra-action","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/infra-action-ci.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  infra-docker:
    name: "Infra Docker"
    needs: gate
    if: contains(fromJSON('["infra-docker","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/infra-docker.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Daily Flatpak Deploy                                          ║
  # ╚════════════════════════════════════════════════════════════════╝

  meshmc-flatpak-deploy:
    name: "MeshMC Flatpak Deploy"
    needs: gate
    if: contains(fromJSON('["daily-flatpak-deploy","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/meshmc-flatpak-deploy.yml
    permissions:
      contents: read
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Daily Jobs                                                    ║
  # ╚════════════════════════════════════════════════════════════════╝

  stale:
    name: "Stale Issues & PRs"
    needs: gate
    if: contains(fromJSON('["daily","all"]'), needs.gate.outputs.group)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Mark stale
        uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 90 days. It will be closed in 10 days if no further activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 30 days. Please rebase or update to keep it alive.
          days-before-stale: 90
          days-before-pr-stale: 30
          days-before-close: 10
          days-before-pr-close: -1
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security,status: blocking"
          stale-issue-label: "state: stale"
          stale-pr-label: "state: stale"

  docker-images:
    name: "Docker Image Rebuild"
    needs: gate
    if: contains(fromJSON('["daily","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/images4docker-build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  mnv-coverity:
    name: "MNV Coverity Scan"
    needs: gate
    if: contains(fromJSON('["daily","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/mnv-coverity.yml
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Weekly Sunday Jobs                                            ║
  # ╚════════════════════════════════════════════════════════════════╝

  mnv-link-check:
    name: "MNV Link Check"
    needs: gate
    if: contains(fromJSON('["weekly-sun","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/mnv-link-check.yml
    secrets: inherit

  scorecard:
    name: "OpenSSF Scorecard"
    needs: gate
    if: contains(fromJSON('["weekly-sun","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/repo-scorecards.yml
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
      issues: read
      pull-requests: read
      checks: read
    secrets: inherit

  meshmc-flake-update:
    name: "MeshMC Nix Flake Update"
    needs: gate
    if: >-
      contains(fromJSON('["weekly-sun","all"]'), needs.gate.outputs.group) &&
      github.repository_owner == 'Project-Tick'
    uses: ./.github/workflows/meshmc-flake-update.yml
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  mnv-codeql:
    name: "MNV CodeQL"
    needs: gate
    if: contains(fromJSON('["weekly-sun","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/mnv-codeql.yml
    permissions:
      contents: read
      security-events: write
    secrets: inherit

  neozip-codeql:
    name: "NeoZip CodeQL"
    needs: gate
    if: contains(fromJSON('["weekly-sun","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/neozip-codeql.yml
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Weekly Wednesday Jobs                                         ║
  # ╚════════════════════════════════════════════════════════════════╝

  json4cpp-flawfinder:
    name: "JSON4CPP Flawfinder"
    needs: gate
    if: contains(fromJSON('["weekly-wed","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/json4cpp-flawfinder.yml
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Weekly Thursday Jobs                                          ║
  # ╚════════════════════════════════════════════════════════════════╝

  json4cpp-semgrep:
    name: "JSON4CPP Semgrep"
    needs: gate
    if: contains(fromJSON('["weekly-thu","all"]'), needs.gate.outputs.group)
    uses: ./.github/workflows/json4cpp-semgrep.yml
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

  # ╔════════════════════════════════════════════════════════════════╗
  # ║  Schedule Verdict                                              ║
  # ╚════════════════════════════════════════════════════════════════╝

  verdict:
    name: "Schedule Verdict"
    if: always()
    needs:
      - gate
      - meshmc-flatpak-update
      - infra-action-ci
      - meshmc-flatpak-deploy
      - infra-docker
      - stale
      - docker-images
      - mnv-coverity
      - mnv-link-check
      - scorecard
      - meshmc-flake-update
      - mnv-codeql
      - neozip-codeql
      - json4cpp-flawfinder
      - json4cpp-semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          set -euo pipefail

          {
            echo "## Scheduled CI Report — ${{ needs.gate.outputs.group }}"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          report() {
            local name="$1" result="$2" icon="⬜"
            case "$result" in
              success) icon="✅" ;; failure) icon="❌"; FAILED=true ;;
              cancelled) icon="⏹️" ;; skipped) icon="⏭️" ;;
            esac
            echo "| $name | $icon $result |" >> "$GITHUB_STEP_SUMMARY"
          }

          report "Stale"            "${{ needs.stale.result }}"
          report "Flatpak Update"   "${{ needs.meshmc-flatpak-update.result }}"
          report "Infra Action CI"  "${{ needs.infra-action-ci.result }}"
          report "Flatpak Deploy"   "${{ needs.meshmc-flatpak-deploy.result }}"
          report "Infra Docker"     "${{ needs.infra-docker.result }}"
          report "Docker Images"    "${{ needs.docker-images.result }}"
          report "MNV Coverity"     "${{ needs.mnv-coverity.result }}"
          report "MNV Link Check"   "${{ needs.mnv-link-check.result }}"
          report "Scorecard"        "${{ needs.scorecard.result }}"
          report "Flake Update"     "${{ needs.meshmc-flake-update.result }}"
          report "MNV CodeQL"       "${{ needs.mnv-codeql.result }}"
          report "NeoZip CodeQL"    "${{ needs.neozip-codeql.result }}"
          report "Flawfinder"       "${{ needs.json4cpp-flawfinder.result }}"
          report "Semgrep"          "${{ needs.json4cpp-semgrep.result }}"

          if [[ "$FAILED" == "true" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**FAILED** — check individual jobs above." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - callback-start
      - verdict
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          VERDICT_RESULT: ${{ needs.verdict.result }}
        run: |
          set -euo pipefail

          case "$VERDICT_RESULT" in
            success)
              status="success"
              ;;
            cancelled)
              status="cancelled"
              ;;
            *)
              status="failure"
              ;;
          esac

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: ./.github/actions/foreman-send-callback
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}

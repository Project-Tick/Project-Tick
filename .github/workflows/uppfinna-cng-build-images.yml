  gitlab-kas:
    needs: gitlab-go
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-kas
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-pages:
    needs: [gitlab-base, gitlab-go]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-pages
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-shell:
    needs: [gitlab-base, gitlab-go]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-shell
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-rails-ce:
    needs: [postgresql, gitlab-graphicsmagick, gitlab-exiftool, gitlab-ruby, gitlab-rust]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-rails-ce
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-sidekiq-ce:
    needs: [gitlab-rails-ce, gitlab-python, gitlab-cosign]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-sidekiq-ce
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-toolbox-ce:
    needs: [gitlab-rails-ce, gitlab-python, gitaly]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-toolbox-ce
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}

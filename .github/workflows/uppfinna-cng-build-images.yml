    secrets: inherit

  gitlab-webservice-ce:
    needs: [gitlab-rails-ce, gitlab-python]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read
    with:
      image: gitlab-webservice-ce
      gitlab-version: ${{ inputs.gitlab-version }}
      image-tag: ${{ inputs.image-tag }}
      cng-ref: ${{ inputs.cng-ref }}
      cng-repository: ${{ inputs.cng-repository }}
    secrets: inherit

  gitlab-workhorse-ce:
    needs: [gitlab-go, gitlab-exiftool, gitlab-rails-ce]
    uses: ./.github/workflows/uppfinna-cng-image.yml
    permissions:
      contents: read

name: Setup macOS dependencies

inputs:
  build-type:
    description: Type for the build
    required: true
    default: Debug

runs:
  using: composite

  steps:
    - name: Install dependencies
      shell: bash
      run: |
        brew update
        brew install ninja extra-cmake-modules temurin@17 autoconf libarchive qrencode pkg-config

    - name: Set JAVA_HOME
      shell: bash
      run: |
        echo "JAVA_HOME=$(/usr/libexec/java_home -v 17)" >> "$GITHUB_ENV"

    - name: Set keg-only library paths
      shell: bash
      run: |
        LIBARCHIVE_PREFIX="$(brew --prefix libarchive)"
        echo "CMAKE_PREFIX_PATH=$LIBARCHIVE_PREFIX" >> "$GITHUB_ENV"

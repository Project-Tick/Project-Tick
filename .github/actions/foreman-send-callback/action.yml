name: Foreman Send Callback
description: Send a JSON callback payload to Foreman when callback credentials are available.

inputs:
  callback_url:
    description: Foreman callback base URL.
    required: false
    default: ""
  callback_token:
    description: Foreman callback bearer token.
    required: false
    default: ""
  callback_token_b64:
    description: Base64-encoded Foreman callback bearer token.
    required: false
    default: ""
  endpoint:
    description: Callback endpoint suffix, for example log_url or status.
    required: true
  payload_json:
    description: Raw JSON payload to send.
    required: true

runs:
  using: composite
  steps:
    - name: Send callback payload
      shell: bash
      env:
        CALLBACK_URL: ${{ inputs.callback_url }}
        CALLBACK_TOKEN: ${{ inputs.callback_token }}
        CALLBACK_TOKEN_B64: ${{ inputs.callback_token_b64 }}
        ENDPOINT: ${{ inputs.endpoint }}
        PAYLOAD_JSON: ${{ inputs.payload_json }}
      run: |
        set -euo pipefail

        if [[ -z "$CALLBACK_TOKEN" && -n "$CALLBACK_TOKEN_B64" ]]; then
          CALLBACK_TOKEN="$(printf '%s' "$CALLBACK_TOKEN_B64" | base64 -d)"
        fi

        if [[ -z "$CALLBACK_URL" || -z "$CALLBACK_TOKEN" ]]; then
          echo "No callback destination configured; skipping ${ENDPOINT}."
          exit 0
        fi

        curl \
          --silent \
          --show-error \
          --fail \
          --retry 3 \
          --retry-all-errors \
          --request POST \
          --header "Authorization: Bearer $CALLBACK_TOKEN" \
          --header "Content-Type: application/json" \
          --data "$PAYLOAD_JSON" \
          "${CALLBACK_URL%/}/${ENDPOINT}"